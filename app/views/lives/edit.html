<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>直播间编辑</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<script src="__STATIC__/admin/js/address3.js"></script>
	<style>
		.layui-form-label{width:130px!important}
		.alert{
			position: fixed;
			height: 100%;
			width: 100%;
			top: 0;
			left: 0;
			z-index: 5;
			display: none;
			background: rgba(0, 0, 0, 0.7);
		}
		.alert_container{
			position: absolute;
			height: 100%;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.alert_module{
			padding: 15px;
			border-radius: 5px;
			background: #fff;
		}
		.alert_title{
			font-size: 18px;
			color: #303133;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}
		.alert_content{
			width: 650px;
			padding: 15px 0;
			display: flex;
		}
		.alert_area{
			flex: 1;
			height: 400px;
			overflow-y: scroll;
		}
		.alert_item{
			font-size: 14px;
			color: #333;
			padding: 0 15px;
			display: flex;
			cursor: pointer;
			min-width: 0;
			align-items: center;
		}
		.alert_icon{
			height: 18px;
			width: 18px;
			box-sizing: border-box;
			border-radius: 4px;
			border: 1px solid;
			background: #fff;
			border-color: #c9c9c9;
		}
		.alert_active{
			display: flex;
			align-items: center;
			justify-content: center;
			background: #1e9fff;
			border-color: #1e9fff;
		}
		.alert_text{
			flex: 1;
			padding: 10px;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			min-width: 0;
		}
		.alert_item:hover{
			background: #ebf5ff;
		}
		.alert_close{
			cursor: pointer;
		}
		.alert_close:hover{
			color: #1e9fff;
		}
		.alert_opt{
			position: relative;
			display: flex;
			justify-content: flex-end;
		}
		.alert_opt button{
			margin-left: 10px;
		}
		::-webkit-scrollbar {
			width: 10px;
			height: 10px;
			background-color: #fff;
			border-radius: 5px;
		}
		::-webkit-scrollbar-thumb {
			background-color: silver;
			border-radius: 5px;
		}
		::-webkit-scrollbar-track {
			background-color: #fff;
		}

		.area{
			position: relative;
			display: flex;
		}
		.area_module{
			padding: 5px 10px;
			border-width: 1px;
			border-style: solid;
			border-color: #e6e6e6;
			background-color: #fff;
			border-radius: 2px;
			display: flex;
			align-items: center;
			font-size: 14px;
			cursor: pointer;
		}
		.area_content{
			min-width: 150px;
			display: flex;
			color: #c9c9c9;
			flex-wrap: wrap;
		}
		.area_item{
			padding: 2px 10px;
			background: #009688;
			color: #fff;
			display: flex;
			align-items: center;
			border-radius: 2px;
			font-size: 14px;
			margin: 2.5px;
		}
	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
			<div class="layui-card layui-col-md12">
				<div class="layui-card-header"><i class="fa fa-edit"></i> 直播间编辑<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i></div>
        <div class="layui-card-body" pad15>
					<div class="layui-form" lay-filter="form">
						<input type="hidden" name="info[id]" value="{$info.id}"/>
						<div class="layui-tab layui-tab-brief" lay-filter="mytab">
						
						<div class="layui-tab-content">
						<!--基本信息start-->
						<div class="layui-tab-item layui-show">
						
							<div class="layui-form-item">
							<label class="layui-form-label">直播间名称</label>
							<div class="layui-input-inline">
								<input type="text" name="info[title]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.title}">
							</div>
						</div>
						
						<div class="layui-form-item">
							<label class="layui-form-label">所属店铺</label>
							<div class="layui-input-inline">
								<select name="info[shop_id]" lay-verify="required"  class="levelid">
								    <option value="0" {if $info['shop_id']==0}selected{/if}>默认</option>
									{foreach $blist as $v}
									<option value="{$v.id}" {if $v['id'] == $info['shop_id']}selected{/if}>{$v.name}</option>
									{/foreach}
								</select>
						    </div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">直播间房号</label>
							<div class="layui-input-inline">
								<input type="text" name="info[room]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.room}">
							</div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">直播间公告</label>
							<div class="layui-input-inline">
							    <textarea name="info[notice]"   id= rows="8" cols="40">{$info.notice}</textarea>
								<!--<input type="text" name="info[notice]" class="layui-input" value="{$info.notice}">-->
							</div>
						</div>
						
						
						<div class="layui-form-item">
							<label class="layui-form-label">封面图片</label>
							<input type="hidden" name="info[cover]" id="cover" class="layui-input" value="{$info.cover}">
							<button style="float:left;" type="button" class="layui-btn layui-btn-primary" upload-input="cover" upload-preview="coverPreview" onclick="uploader(this)">上传图片</button>
							<div class="layui-form-mid layui-word-aux" style="margin-left:10px;"></div>
							<div id="coverPreview" style="float:left;padding-top:10px;margin-left:160px;clear: both;">
								<div class="layui-imgbox" style="width:100px;"><div class="layui-imgbox-img"><img src="{$info.cover}"/></div></div>
							</div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">首页推荐</label>
							<div class="layui-input-inline">
								<input type="radio" name="info[isrecommend]" value="1" title="开启" {if $info['isrecommend']==1}checked{/if}>
								<input type="radio" name="info[isrecommend]" value="0" title="关闭" {if $info['isrecommend']!=1}checked{/if} >
							</div>
							<div class="layui-form-mid layui-word-aux"></div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">是否开启</label>
							<div class="layui-input-inline">
								<input type="radio" name="info[isclose]" value="1" title="否" {if $info['isclose']==1}checked{/if}>
								<input type="radio" name="info[isclose]" value="0" title="是" {if $info['isclose']!=1}checked{/if} >
							</div>
							<div class="layui-form-mid layui-word-aux"></div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">会员ID</label>
							<div class="layui-input-inline">
								<input type="text" name="info[mid]" class="layui-input" value="{$info.mid}">
							</div>
							<div class="layui-form-mid layui-word-aux"></div>
						</div>
					
  					</div>
					
					<div class="layui-form-item">
					  <label class="layui-form-label"></label>
					  <div class="layui-input-block">
						  <button class="layui-btn" lay-submit lay-filter="formsubmit">提 交</button>
					  </div>
					</div>
					</div>
			   </div>
			</div>
		</div>
	</div>
</div>
</div>
  	{include file="public/js"/}
	<script>
	layui.form.on('submit(formsubmit)', function(obj){
		var field = obj.field
		var index = layer.load();
		$.post("{:url('save')}",field,function(data){
			layer.close(index);
			dialog(data.msg,data.status);
			if(data.status == 1){
				setTimeout(function(){
					parent.layer.closeAll();
					parent.tableIns.reload()
				},1000)
			}
		})
	})
  </script>
	{include file="public/copyright"/}
</body>
</html>
