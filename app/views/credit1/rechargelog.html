<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>充值记录</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
   {include file="public/css"/}
	<style>
	.orderdetail{background:#f7f7f8;width: 94%;box-sizing:border-box;margin:0 10px;display:flex;flex-direction:column;}
	.orderdetail *{box-sizing:border-box;}

	.orderinfo{ width:100%;margin-top:5px;padding: 5px;background: #FFF;}
	.orderinfo .item{display:flex;width:100%;padding:10px 0;border-bottom:1px dashed #ededed;overflow:hidden}
	.orderinfo .item:last-child{ border-bottom: 0;}
	.orderinfo .item .t1{width:100px;flex-shrink:0}
	.orderinfo .item .t2{flex:1;text-align:right;}
	.orderinfo .item .red{color:red}

	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header"><i class="fa fa-list"></i> 充值记录</div>
          <div class="layui-card-body" pad15>
						<div class="layui-col-md4" style="padding-bottom:10px">
							<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">删除</button>
							<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="location.href='{:url('rechargelogexcel')}'+urlEncode(datawhere)">导出EXCEL</button>
						</div>
						<div class="layui-form layui-col-md8" style="text-align:right;padding-bottom:10px">
							<div class="layui-inline layuiadmin-input-useradmin">
								<label class="layui-form-label" style="width:60px">{:t('会员')}ID</label>
								<div class="layui-input-block" style="width:120px;margin-left:90px">
									<input type="text" name="mid" autocomplete="off" class="layui-input" value="{$Request.param.mid}">
								</div>
							</div>
							<div class="layui-inline layuiadmin-input-useradmin">
								<label class="layui-form-label" style="width:60px">昵称</label>
								<div class="layui-input-block" style="width:120px;margin-left:90px">
									<input type="text" name="nickname" autocomplete="off" class="layui-input" value="{$Request.param.nickname}">
								</div>
							</div>
							 <div class="layui-inline">
								<label class="layui-form-label" style="width:30px">状态</label>
								<div class="layui-input-block" style="width:120px;margin-left:60px;text-align:left">
									<select name="check_status">
										<option value="">全部</option>
										<option value="0">待审核</option>
										<option value="1">审核通过</option>
										<option value="2">驳回</option>
									</select>
								</div>
							</div> 
							<div class="layui-inline">
								<label class="layui-form-label" style="width:60px;">提交时间</label>
								<div class="layui-input-block" style="width:180px;margin-left:90px">
									<input type="text" name="ctime" id="ctime" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-inline">
								<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
									<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
								</button>
							</div>
						</div>
						<div class="layui-col-md12">
							<table id="tabledata" lay-filter="tabledata"></table>
						</div>
          </div>
        </div>
    </div>
  </div>
	{include file="public/js"/}
	<script>
	layui.laydate.render({ 
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
  var table = layui.table;
	var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: true //开启分页
    ,cols: [[ //表头
			{type:"checkbox"},
      //{field: 'id', title: 'ID',sort:true,width:80},
      {field: 'mid', title: '{:t('会员')}ID',width:80},
      {field: 'nickname', title: '{:t('会员')}信息',templet:'<div>{{# if(d.nickname){ }}<img src="{{d.headimg}}" style="width:50px"> {{d.nickname}}{{# } }}</div>'},
      {field: 'money', title: '充值金额',sort:true,width:120},
      {field: 'createtime', title: '充值时间',sort:true,templet:function(d){ return date('Y-m-d H:i',d.createtime)}},
			{field: 'paytype', title: '支付方式'},
      {field: 'paynum', title: '付款单号'},
      {field: 'paytime', title: '付款时间',templet:function(d){ if(d.paytime) return date('Y-m-d H:i',d.paytime);else return ''}},
      {field: 'status', title: '状态',width:120,templet:function(d){ 
             if(d.check_status==0){
		     	return '<span style="color:#888">待审核</span>';
             }	
             if(d.check_status==2){
		     	return '<span style="color:#888">拒绝</span>';
             }	
             
             if(d.check_status==1){
		     	if(d.status==1) return '<span style="color:green">充值成功</span>';
             }
             
				
			}},
     
      {field: 'op', title: '操作',minWidth:100,templet:function(d){
			var html = '';
		  if(d.paytypeid==5 && d.check_status>=0){
			  html += '<button class="table-btn" onclick="doOperation('+d.id+',\'付款凭证\')">付款凭证</button>';
		  }
		
		html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button>';
		
		return html;
      }}
      
      
      
    ]]
  });
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})
		function doOperation(orderid,type){
		var index_load = layer.load();
		$.post("{:url('getdetail')}",{orderid:orderid},function(data){
			layer.close(index_load);
			btnOperation(type,data);
		})
	}
	function btnOperation(type,data){
		var orderid = data.order.id;
			layui.laytpl(payCheckTpl.innerHTML).render(data.payorder, function(html){
				var refundCheckLayer = layer.open({type:1,title:false,content:html,shadeClose:true,btn: ['确认已支付', '驳回'],
					yes:function(){
						var index = layer.load();
						$.post("{:url('payCheck')}",{orderid:orderid,st:1,remark:$('input[name=check_remark]').val()},function(res){
							layer.close(index);
							dialog(res.msg,res.status);
							layer.close(refundCheckLayer);
						
							tableIns.reload()
						})
					},
					btn2:function(){
						var index = layer.load();
						$.post("{:url('payCheck')}",{orderid:orderid,st:2,remark:$('input[name=check_remark]').val()},function(res){
							layer.close(index);
							dialog(res.msg,res.status);
							layer.close(refundCheckLayer);
						
							tableIns.reload()
						})
					}
				})
			})
	
		return false;
	}
	//删除
	function datadel(id){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			var ids = [];
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id)
		}
		layer.confirm('确定要删除吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('rechargelogdel')}",{ids:ids},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
	</script>
	
  <script id="payCheckTpl" type="text/html">
	  <div class="orderdetail">
		  <div class="orderinfo">
			  <div class="item">
				  <span class="t1">审核状态</span>
				  <span class="t2 red">{{d.check_status_label}}</span>
			  </div>
			  <div class="item">
				  <span class="t1">凭证图片</span>
				  <span class="t2 red">
					{{#  if(d.paypics){ }}
					{{d.paypics_html}}
					{{# } }}
				</span>
			  </div>
			  <div class="item">
				  <span class="t1">审核备注</span>
				  <span class="t2"><input type="text" name="check_remark" value="{{d.check_remark ? d.check_remark : ''}}" style="height:30px"/></span>
			  </div>
		  </div>
	  </div>
  </script>

	{include file="public/copyright"/}
</body>
</html>
