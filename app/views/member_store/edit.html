	<script>
	layui.form.on('radio(rate1)', function(data){
		if(data.value == '1'){
		    $('#can_applyset').show();
			$('#can_applyset2').hide();
		}else{
		    $('#can_applyset2').show();
			$('#can_applyset').hide();
		}
	})
	layui.form.on('submit(formsubmit)', function(obj){
		var field = obj.field
		var index = layer.load();
		$.post("{:url('save')}",field,function(data){
			layer.close(index);
			dialog(data.msg,data.status);
			if(data.status == 1){
				setTimeout(function(){
					parent.layer.closeAll();
					parent.tableIns.reload()
				},1000)
			}
		})
	})
  </script>
