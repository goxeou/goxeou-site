<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{:t('会员')}列表</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<style>
	.layui-table-body .layui-table .layui-table-cell{height:auto;line-height:auto}
	.orderdetail{background:#fff;width: 94%;box-sizing:border-box;margin:0 10px;display:flex;flex-direction:column;}
	.orderdetail *{box-sizing:border-box;}
	.orderinfo{ width:100%;margin-top:5px;padding: 5px;background: #FFF;}
	.orderinfo .item{display:flex;width:100%;padding:5px 0;border-bottom:1px dashed #ededed;}
	.orderinfo .item:last-child{ border-bottom: 0;}
	.orderinfo .item .t1{width:100px;}
	.orderinfo .item .t2{flex:1;text-align:right}
	.orderinfo .item .red{color:red}
	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
			<div class="layui-card-header">
				{:t('会员')}列表
				{if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}
			</div>
          	<div class="layui-card-body" pad15>
			<!-- <blockquote class="layui-elem-quote">已领取会员卡的用户将收到会员卡的{:t('优惠券')}变动通知</blockquote> -->
			<div class="layui-col-md3" style="padding-bottom:10px">
				<button class="layui-btn layui-btn-primary" onclick="sendopen(0)">分红选中项</button>
				<button class="layui-btn layui-btn-primary" onclick="sendopen(2)">分红选中项团队</button>
				<button class="layui-btn layui-btn-primary" onclick="sendopen(1)">分红全部</button>
			</div>
			<div class="layui-form layui-col-md9 layui-form-search">
				<div class="layui-inline layuiadmin-input-useradmin">
					<label class="layui-form-label">关键字</label>
					<div class="layui-input-inline">
						<input type="text" name="nickname" autocomplete="off" class="layui-input">
					</div>
				</div>
			
				<div class="layui-inline">
					<label class="layui-form-label">推荐人ID</label>
					<div class="layui-input-inline">
						<input type="text" name="pid" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-inline">
					<label class="layui-form-label">等级</label>
					<div class="layui-input-inline">
						<select name="levelid">
							<option value="">全部</option>
							{foreach $levelArr as $k=>$v}
							<option value="{$k}">{$v}</option>
							{/foreach}
						</select>
					</div>
				</div>
				{if getcustom('teamlevel')}
					<div class="layui-inline">
						<label class="layui-form-label" style="width:60px">{:t('团队等级')}</label>
						<div class="layui-input-block" style="width:100px;margin-left:90px;text-align:left">
							<select name="teamlevel">
								<option value="">全部</option>
								{foreach $teamArr as $k=>$v}
								<option value="{$k}">{$v}</option>
								{/foreach}
							</select>
						</div>
					</div>
				{/if}
				<div class="layui-inline">
					<label class="layui-form-label">加入时间</label>
					<div class="layui-input-inline" style="width:180px">
						<input type="text" name="ctime" id="ctime" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-inline">
					<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
						<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
					</button>
				</div>
			</div>
			<div class="layui-col-md12">
				<table id="tabledata" lay-filter="tabledata"></table>
			</div>
          </div>
        </div>
    </div>
  </div>
	<div id="sendModel" style="width:500px;display:none;margin-top:30px">
		<div class="layui-form form-label-w6" lay-filter="">
			<input type="hidden" name="cpid" value="{$coupon.id}"/>
			<input type="hidden" name="sendtype" id="sendtype" value="0"/>
			<div class="layui-form-item">
				<label class="layui-form-label">分红金额：</label>
				<div class="layui-input-inline" style="width:190px">
					<input type="text" name="persendnum" id="persendnum" value="" lay-verify="required" lay-verType="tips" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">加入时间：</label>
				<div class="layui-input-inline" style="width:190px">
					<input type="text" name="ctime2" id="ctime2" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label">发送人数：</label>
				<div class="layui-form-mid" id="sendnum">0</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label"></label>
				<div class="layui-input-block">
					<button class="layui-btn layui-btn-normal" lay-submit lay-filter="formsend">发送</button>
				</div>
			</div>
		</div>
	</div>
	{include file="public/js"/}
	<script>
  var table = layui.table;
	var datawhere = {};
	var totalnum = 0;
	var dataurl = "{:url('Member/index')}";
	
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: dataurl //数据接口
    ,page: true //开启分页
		,checkbox: true
    ,cols: [[ //表头
		{type:"checkbox"},
      {field: 'id', title: 'ID',sort: true,templet: function(d){
			  if(d.mid &&  d.mid > 0)
				  return d.mid;
			  else
				  return d.id;
		  },width:60},
      {field: 'nickname', title: '推荐人',templet: function(d){ 
				if(d.parent && d.parent.id){
					return '<img src="'+d.parent.headimg+'" style="height:30px"/>'+d.parent.nickname + (d.pid ? d.pid : '');
				}else{
					return '无';
				}
			}},
      {field: 'nickname', title: '头像昵称',templet: '<div><img src="{{d.headimg}}" style="height:30px"/> {{d.nickname}}</div>'},
      {field: 'realname',width:160,align:"center", title: '姓名/电话',templet:function(d){
				return (d.realname ? d.realname : '') + '<br>' + (d.tel ? d.tel : '')
      }},
      {field: 'money', title: "{:t('余额')}",sort: true,width:100},
      {field: 'score', title: '{:t('积分')}',sort: true,width:100},
      {field: 'commission', title: '{:t('佣金')}',sort: true,width:100},
       {if getcustom('credit1')}
        	{field: 'credit1', align:"center", title: '{:t('credit1')}',sort: true,width:100,templet:function(d){
        		return '<a href="javascript:void(0)" onclick="openmax(\'{:url('Credit1/credit1log')}&isopen=1&mid='+d.id+'\')">'+d.credit1+'</a>';
            }},
	   {/if}
      {field: 'levelname', title: '等级',width:100},
      	{if getcustom('teamlevel')}
			{field: 'teamlevel', sort: true,width:100,align:"center",title: '{:t('团队等级')}',templet:function(d){
    				return  (d.teamlevel ? d.teamlevel : '')
            }},
		{/if}
      
      	{field: 'downcount', title: '团队业绩',width:160,templet:function(d){
				  return d.downcount+'人<br>团队'+d.teamyeji+'元 小区'+d.teamyeji2+'元';
	    }},
   
      {field: 'createtime', title: '加入时间',sort: true,templet:function(d){ return date('Y-m-d H:i',d.createtime)}},
    ]],
		done: function(res, curr, count){
			totalnum = count;
			console.log(totalnum)
		}
  });
	
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//日期范围选择
	layui.laydate.render({ 
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
	//日期范围选择
	layui.laydate.render({ 
		elem: '#ctime2',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})

	var sendlayer
	var sendids

	function sendopen(type){
		if(type==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			var id = [];
			for(var i=0;i<checkData.length;i++){
				if(checkData[i]['mid'])
					id.push(checkData[i]['mid']);
				else
					id.push(checkData[i]['id']);
			}
			sendids = id;
			$('#sendnum').html(sendids.length+'人');
		}else if(type==2){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			var id = [];
			for(var i=0;i<checkData.length;i++){
				if(checkData[i]['mid'])
					id.push(checkData[i]['mid']);
				else
					id.push(checkData[i]['id']);
			}
			sendids = id;
			$.post("{:url('getdetail')}",{ids:sendids},function(data){
    	      	$('#sendnum').html(data.count+'人');
    		})
			
		}else{
			sendids = []
			$('#sendnum').html(totalnum+'人');
		}
		$('#sendtype').val(type);
		sendlayer = layer.open({type:1,area: ['500px', '480px'],title:'分红设置',content:$('#sendModel'),shadeClose:true})
	}
	var pagenum = 0;
	var pagelimit = 20;
	//发送提交
	  layui.form.on('submit(formsend)', function(obj){
			pagenum = 0;
			var index= layer.load();
			var field = obj.field
			field.ids = sendids
			field.datawhere = datawhere
			var index = layer.load();
    		$.ajax({
    			type:'POST',
    			url:"{:url('sendfenhong')}",
    			dataType:'json',
    			data:field,
    			success:function(data){
    				layer.close(index);
    				if(field.sendtype == 1){
    					if(data.status==1){
    						layer.msg('已发送'+data.sucnum+'条数据',{offset:'100px'});
    					}
						dialog(data.msg,data.status);
						setTimeout(function(){
							parent.layer.closeAll();
							parent.tableIns.reload()
						},1000);
    					
    				}else if(field.sendtype == 1){
    					if(data.status==1){
    						layer.msg('已发送'+data.sucnum+'条数据',{offset:'100px'});
    					}
						dialog(data.msg,data.status);
						setTimeout(function(){
							parent.layer.closeAll();
							parent.tableIns.reload()
						},1000);
    				}else{
    					dialog(data.msg,data.status);
    					setTimeout(function(){
    						parent.layer.closeAll();
    						parent.tableIns.reload()
    					},1000);
    				}
    			},
    			error:function(){
    				layer.close(index);
    				dialog('未知错误',0);
    			}
    		})
	  });
	

	</script>
	{include file="public/copyright"/}
</body>
</html>
