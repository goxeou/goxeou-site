<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>消息推送</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<link href="__STATIC__/imgsrc/designer.css" rel="stylesheet">
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
				<div class="layui-card-header">
					消息推送
					<button class="layui-btn layui-btn-primary layui-btn-sm" onclick="openmax('{:url('sendlog')}/isopen/1')" style="float: right;margin-left:10px;margin-top: 6px;">发送记录</button>
				</div>
				<div class="layui-card-body" pad15>
					<div class="flex">
						<div class="layui-form flex1" lay-filter="" style="padding-bottom:20px">
							<div class="layui-form-item">
								<label class="layui-form-label" style="width:110px">通知标题：</label>
								<div class="layui-input-inline" style="width:300px">
										<input  class="layui-input" name="info[title]" value=""/>
								</div>
								<div class="layui-form-mid">50字内</div>
							</div>
							<div id="fieldcontent">
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label" style="width:110px">通知内容：</label>
								<div class="layui-input-inline" style="width:300px">
									<textarea class="layui-textarea" name="info[remark]" style="height:100px;"></textarea>
								</div>
									<div class="layui-form-mid">50字内</div>
							</div>
							<!--<div class="layui-form-item">-->
							<!--	<label class="layui-form-label" style="width:110px">链接地址：</label>-->
							<!--	<div class="layui-input-inline" style="width:300px">-->
							<!--		<input type="text" name="info[url]" class="layui-input" value="">-->
							<!--	</div>-->
							<!--	<button class="layui-btn layui-btn-primary" onclick="chooseUrl()" style="float:left">选择链接</button>-->
							<!--</div>-->
							<div class="layui-form-item">
								<label class="layui-form-label" style="width:110px">发送对象：</label>
								<div class="layui-input-inline" style="width:500px">
									<input type="radio" name="info[to_type]" value="1" checked title="cid用户" lay-filter="to_type"/>
									<input type="radio" name="info[to_type]" value="2" title="选择标签" lay-filter="to_type"/>
									<input type="radio" name="info[to_type]" value="3" title="全部用户({$fanscount})" lay-filter="to_type"/>
								</div>
							</div>
							<div class="layui-form-item" id="to_type_1">
								<label class="layui-form-label" style="width:110px">用户cid：</label>
								<div class="layui-input-inline" style="width:300px">
									<textarea class="layui-textarea" name="info[openids]" style="height:200px"></textarea>
								</div>
							</div>
							<div class="layui-form-item" id="to_type_2" style="display:none">
								<label class="layui-form-label" style="width:110px">选择标签：</label>
								<div class="layui-input-inline" style="width:200px">
									<select name="info[tagid]">
										<option value="">请选择标签</option>
										{foreach $tagslist as $v}
										<option value="{$v.id}">{$v.name}({$v.count})</option>
										{/foreach}
									</select>
								</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label" style="width:110px"></label>
								<div class="layui-input-block">
									<button class="layui-btn" lay-submit lay-filter="setmypass">确认发送</button>
								</div>
							</div>
						</div>
					
					</div>
				</div>
			</div>
    </div>
  </div>
	{include file="public/js"/}
	<script>
	var tmpllist = {:jsonEncode($tmpllist)};
	layui.form.on('radio(to_type)',function(data){
		$('#to_type_1').hide();
		$('#to_type_2').hide();
		if(data.value==1){
			$('#to_type_1').show();
		}
		if(data.value==2){
			$('#to_type_2').show();
		}
	})
	
	var pagenum = 0;
	var pagelimit = 20;
	layui.form.on('submit(setmypass)', function(obj){
		var field = obj.field
		pagenum = 0;
		//var index= layer.load();
		var field = obj.field
		_tplsend(field);
		return;
		var index = layer.load();
		$.post('',obj.field,function(data){
			layer.close(index);
			dialog(data.msg,data.status);
			if(data.status){
				setTimeout(function(){
					location.href="{:url('sendlog')}";
				},2000)
			}
		})
	})
	function _tplsend(field){
			var index = layer.load();
			pagenum++;
			$.ajax({
				type:'POST',
				url:"{:url('send')}/pagenum/"+pagenum+'/pagelimit/'+pagelimit,
				dataType:'json',
				data:field,
				success:function(res){
					console.log(res)
					layer.close(index);
					if(res.status==1){
						dialog('共发送'+res.sendcount+'条,成功'+res.successcount+'条,失败'+res.errorcount+'条',res.status,"{:url('sendlog')}");
					}else{
						dialog(res.msg,res.status);
					}
				
				},
				error:function(){
					layer.close(index);
					dialog('未知错误',0);
				}
			})
	}
	
  </script>
	<script>
	function chooseUrl(){
		layer.open({type:2,shadeClose:true,area:['1100px', '650px'],'title':'选择链接',content:"{:url('DesignerPage/chooseurl')}"})
	}
	function chooseLink(urlname,url){
		url = '{$Think.const.PRE_URL2}/h5/{$aid}.html#'+url;
		$("input[name='info[url]']").val(url);
	}
	</script>
	{include file="public/copyright"/}
</body>
</html>
