<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>工单数据</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<style>

	.layui-btn-sm {margin-top: 5px;height: 30px;line-height: 30px;
    padding: 0 5px;
    font-size: 12px; }
    
	.layui-table-cell{height:auto;overflow:visible; text-overflow:inherit; }
	.logistics{ width: 94%;  background: #fff; padding: 0 10px;display:flex;flex-direction:column;color: #979797;}
	.logistics .on{color: #23aa5e;}
	.logistics .item{display:flex;width: 96%;  margin: 0 2%;/*border-left: 1px #dadada solid;*/padding:0 0}
	.logistics .item .f1{ width:30px;position:relative}
	/*.logistics img{width: 15px; height: 15px; position: absolute; left: -8px; top:11px;}*/
	.logistics .item .f1 img{ width: 15px; height: 100%;}

	.logistics .item .f2{display:flex;flex-direction:column;flex:auto;padding:5px 0}
	.logistics .item .f2 .t1{font-size: 15px;}
	.logistics .item .f2 .t1{font-size: 13px;}
	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header">
						<i class="fa fa-list"></i> 数据
							{if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}
					</div>
                    <div class="layui-card-body" pad15>
						<div class="layui-col-md4" style="padding-bottom:10px">
							<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="setst(0,4)">确认</button>
							<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="setst(0,3)">驳回</button>
							<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">删除</button>
							<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="location.href='{:url('recordexcel')}/formid/{$Request.param.formid}'+urlEncode(datawhere)">导出</button>
						</div>
						<div class="layui-form layui-col-md8" style="text-align:right;padding-bottom:10px">
						
							<div class="layui-inline layuiadmin-input-useradmin" style="display:none">
								<label class="layui-form-label" style="width:50px">{:t('会员')}ID</label>
								<div class="layui-input-block" style="width:120px;margin-left:80px">
									<input type="text" name="mid" value="{$Request.param.mid}" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-inline">
								<label class="layui-form-label" style="width:60px;">内容</label>
								<div class="layui-input-block" style="width:180px;margin-left:90px">
									<input type="text" name="keyword" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-inline">
								<label class="layui-form-label" style="width:60px;">提交时间</label>
								<div class="layui-input-block" style="width:180px;margin-left:90px">
									<input type="text" name="ctime" id="ctime" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-inline">
								<label class="layui-form-label" style="width:30px">状态</label>
								<div class="layui-input-block" style="width:120px;margin-left:60px;text-align:left">
									<select name="status">
										<option value="">全部</option>
										<option value="1">待支付</option>
										<option value="2">待审核</option>
										<option value="3">已驳回</option>
										<option value="4">已通过</option>
									</select>
								</div>
								</div>
						
							<div class="layui-inline">
								<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
									<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
								</button>
							</div>
						</div>
						<div class="layui-col-md12">
							<table id="tabledata" lay-filter="tabledata"></table>
						</div>
          </div>
        </div>
    </div>
  </div>
  
	{include file="public/js"/}

	<script>
	layui.laydate.render({ 
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
  var table = layui.table;
	var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: true //开启分页
    		, done: function() {
        // 解决操作栏因为内容过多换行问题
        $(".layui-table-main tr").each(function (index, val) {
            $($(".layui-table-fixed-l .layui-table-body tbody tr")[index]).height($(val).height());
            $($(".layui-table-fixed-r .layui-table-body tbody tr")[index]).height($(val).height());
        });
    }	
    ,cols: [[ //表头
			{type:"checkbox"},
      {field: 'id', title: 'ID',  width:80},
      {field: 'id', title: '头像昵称',width:180,templet:function(d){
			if(d.headimg){
				return '<img src="'+d.headimg+'" style="height:30px"> ' + d.nickname + '(ID:'+ d.mid +')';
			}
			return '';
      }},
     {field: 'form0', title: '姓名/电话/身份证',templet:function(d){
        html = '';
		if(d.form0){
			html += '<span style="">姓名: '+d.form0+'</span>';
		}
		if(d.form1){
			html += '<br><span style="">电话: '+d.form1+'</span>';
		}
		if(d.form2){
			html += '<br><span style="">身份证: '+d.form2+'</span>';
		}
		return html;
	},width:200},
	
	 {field: 'form0', title: '申请日期/加盟费',templet:function(d){
        html = '';
		if(d.form3){
			html += '<span style=""> '+d.form3+'</span>';
		}
		if(d.form4){
			html += '<br><span style="">'+d.form4+'</span>';
		}
		
		return html;
	},width:140},
	
	 {field: 'form0', title: '推荐人/账号/手机号',templet:function(d){
        html = '';
		if(d.form5){
			html += '<span style=""> '+d.form5+'</span>';
		}
		if(d.form6){
			html += '<br><span style="">'+d.form6+'</span>';
		}
		if(d.form9){
			html += '<br><span style="">'+d.form9+'</span>';
		}
		return html;
	},width:160},
	{field: 'form0', title: '组长姓名/组长账号',templet:function(d){
        html = '';
		if(d.form7){
			html += '<span style=""> '+d.form7+'</span>';
		}
		if(d.form8){
			html += '<br><span style="">'+d.form8+'</span>';
		}
		
		return html;
	},width:140},
	
	{field: 'form0', title: '开户行/银行卡',templet:function(d){
        html = '';
		if(d.form10){
			html += '<span style=""> '+d.form10+'</span>';
		}
		if(d.form11){
			html += '<br><span style="">'+d.form11+'</span>';
		}
		
		return html;
	},width:140},
	{field: 'form0', title: '工作室/申请人账号',templet:function(d){
        html = '';
		if(d.form12){
			html += '<span style=""> '+d.form12+'</span>';
		}
		if(d.form13){
			html += '<br><span style="">'+d.form13+'</span>';
		}
		
		return html;
	},width:140},
	   //{field: 'form0', title: '姓名',  width:80},
	   // {field: 'form1', title: '电话',  width:80},
	   //  {field: 'form2', title: '身份证',  width:80}, 
	   //  {field: 'form3', title: '申请日期',  width:80},
	   //   {field: 'form4', title: '加盟费',  width:80},
	       //{field: 'form5', title: '推荐人姓名',  width:80},
	       // {field: 'form6', title: '推荐人账号',  width:80},
	       //  {field: 'form7', title: '组长姓名',  width:80},
	       //   {field: 'form8', title: '组长账号',  width:80},
	           //{field: 'form9', title: '推荐人手机号',  width:100},
	           //{field: 'form10', title: '申请人开户行',  width:100},
	           //{field: 'form11', title: '申请人银行卡',  width:100},
	           //{field: 'form12', title: '所属工作室',  width:100},
	           //{field: 'form13', title: '申请人账号',  width:80},
	           {field: 'form14', title: '签名',  width:80},
	           
      { field: 'pics', title: "支付凭证",width:380,templet:function(d){
				var html='';
				for(var i=0;i<d.pics.length;i++){
					html+='<img src="'+d.pics[i]+'" style="width:50px" onclick="preview(this)"/>';
				}
				return html;
		}},
     {field: 'status', title: '状态',width:150,templet:function(d){ 
	  		var html = '';
			if(d.status==1) return  '<span style="color:#888">已提交,待支付</span>';
			if(d.status==2) return '<span style="color:red">已上传,待审核</span>';
			if(d.status==3) return '<span style="color:red">已驳回'+(d.reason?','+d.reason:'') + '<br></span>';
			if(d.status==4) return '<span style="color:green">审核通过</span>';
     	}},
      {field: 'createtime', title: '提交时间',templet:function(d){ return date('Y-m-d H:i',d.createtime)},width:150},
      
      {fixed: 'right', title: '操作',templet:function(d){
				var html = '';
				if(d.status==1 || d.status==2 || d.status==4){
					html += '<button class="table-btn" onclick="setst('+d.id+',3)">驳回</button>';
				}
			    if(d.status==2 || d.status==3){
					html += '<button class="table-btn" onclick="setst('+d.id+',4)">通过</button>';
				}
				if(d.pics){
					html += '<br><button class="table-btn" onclick="previewImages(\''+d.pics+'\')">查看图片</button>';
				}
				html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button></div>';
				return html;
      },width:250}
    ]]
  });
  
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})
	function previewImages(pics){
		var pics = pics.split(',');
		var html = '';
		html += '<div class="layui-carousel" id="test1">';
		html += '  <div carousel-item>';
		for(var i in pics){
			html += '    <div><img src="'+pics[i]+'" style="max-width:100%;max-height:100%" onclick="window.open(\''+pics[i]+'\')"/></div>';
		}
		html += '  </div>';
		html += '</div>';
		layer.open({type:1,area:['500px','500px'],content:html,title:false,shadeClose:true})
		layui.carousel.render({
			elem: '#test1'
			,width: '100%' //设置容器宽度
			,height:'100%'
			,arrow: 'always' //始终显示箭头
			,autoplay: false
			//,anim: 'updown' //切换动画方式
		});
		//layer.open({type:1,area:'500px',content:'<div style="margin:auto auto;text-align:center"><img src="'+url+'" style="max-width:100%;max-height:100%" onclick="window.open(\''+url+'\')"/></div>',title:false,shadeClose:true})
	}
	//删除
	function datadel(id){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			var ids = [];
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id)
		}
		layer.confirm('确定要删除吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('recorddel')}",{ids:ids},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
	//改状态
	function setst(id,st){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			var ids = [];
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id)
		}
		if(st==3){
			var html = '<div class="layui-form" style="width:100%">';
			html+='	<div class="layui-form-item" style="margin-top:40px;margin-right:20px;">';
			html+='		<label class="layui-form-label" style="width:80px">驳回原因：</label>';
			html+='		<div class="layui-input-inline" style="width:300px">';
			html+='			<input type="text" id="reason" class="layui-input"/>';
			html+='		</div>';
			html+='	</div>';
			html+='	</div>';
			var bohuiLayer = layer.open({type:1,area:['500px','250px'],title:false,content:html,shadeClose:true,btn: ['确定', '取消'],
				yes:function(){
					var index = layer.load();
					var istuikuan = $('input[name=tuikuan]:checked').val();
					if(!istuikuan) istuikuan = 0;
					$.post("{:url('recordsetst')}",{ids:ids,st:st,reason:$('#reason').val(),istuikuan:istuikuan},function(res){
						layer.close(index);
						dialog(res.msg,res.status);
						layer.close(bohuiLayer);
						tableIns.reload()
					})
				}
			})
			layui.form.render();
			return;
		}
		layer.confirm('确定要'+(st==3?'驳回':'确认')+'吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('recordsetst')}",{ids:ids,st:st},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
	//日期范围选择
	layui.laydate.render({ 
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
	</script>
	{include file="public/copyright"/}
</body>
</html>
