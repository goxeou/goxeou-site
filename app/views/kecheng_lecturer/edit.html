<!DOCTYPE html><!--custom_file(kecheng_lecturer)-->
<html>
<head>
  <meta charset="utf-8">
  <title>课程讲师设置</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          {if !$info['id']}<i class="fa fa-plus"></i> 添加课程讲师{else}<i class="fa fa-pencil"></i> 编辑课程讲师{/if}
          <i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>
        </div>
        <div class="layui-card-body" pad15>
          <div class="layui-form">
            <input type="hidden" name="info[id]" value="{$info.id}"/>
            <div class="layui-form-item">
              <label class="layui-form-label">头像：</label>
              <input type="hidden" name="info[headimg]" id="headimg" class="layui-input" value="{$info.headimg}">
              <button style="float:left;" type="button" class="layui-btn layui-btn-primary" upload-input="headimg" upload-preview="headimgPreview" onclick="uploader(this)">上传图片</button>
              <div class="layui-form-mid layui-word-aux" style="margin-left:10px;">建议尺寸：150×150像素</div>
              <div id="headimgPreview" class="picsList-class-padding" style="padding-top: 10px;padding-left: 110px;clear: both;">
                <div class="layui-imgbox" style="width:100px;"><div class="layui-imgbox-img"><img src="{$info.headimg}"/></div></div>
              </div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">昵称：</label>
              <div class="layui-input-inline">
                <input type="text" name="info[nickname]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.nickname}">
              </div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">姓名：</label>
              <div class="layui-input-inline" style="width:200px">
                <input type="text" name="info[realname]" class="layui-input" value="{$info.realname}">
              </div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">手机号：</label>
              <div class="layui-input-inline" style="width:200px">
                <input type="text" name="info[tel]" class="layui-input" value="{$info.tel}">
              </div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">登录密码</label>
              <div class="layui-input-inline">
                <input type="text" name="info[pwd]" autocomplete="off" class="layui-input" value="" placeholder="留空表示不修改密码">
              </div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">{:t('会员')}ID：</label>
              <div class="layui-input-inline" style="width:200px">
                <input type="text" name="info[mid]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.mid}">
              </div>
              <div class="layui-form-mid layui-word-aux"><a href="javascript:vodi(0)" onclick="openmax('{:url('member/index')}/isopen/1')">查找{:t('会员')}ID</a></div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">分佣比例：</label>
              <div class="layui-input-inline">
                <input type="text" name="info[commissionratio]" value="{$info.commissionratio|default=0}" class="layui-input">
              </div>
              <div class="layui-form-mid layui-word-aux">% 会员购买课程后，讲师得到订单金额X%分佣，发放到讲师的{:t('余额')}中</div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">简介：</label>
              <div class="layui-input-inline" style="width:500px">
                <input type="text" name="info[shortdesc]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.shortdesc}">
              </div>
            </div>
            <div class="layui-form-item">
              <label class="layui-form-label">序号：</label>
              <div class="layui-input-inline">
                <input type="text" name="info[sort]" value="{$info.sort|default=0}" class="layui-input">
              </div>
              <div class="layui-form-mid layui-word-aux" style="margin-left:10px;">用于排序,越大越靠前</div>
            </div>
            <!-- <div class="layui-form-item">
              <label class="layui-form-label">状态：</label>
              <div class="layui-input-inline">
                <input type="radio" name="info[status]" value="1" title="开启" {if !$info['id'] || $info['status']==1}checked{/if}>
                <input type="radio" name="info[status]" value="0" title="关闭" {if $info['id'] && $info['status']==0}checked{/if}>
              </div>
              <div class="layui-form-mid layui-word-aux" style="margin-left:10px;">关闭则账号不能使用</div>
            </div> -->
            <div class="layui-form-item">
              <div class="layui-input-block">
                <button class="layui-btn layui-btn-danger" lay-submit lay-filter="formsubmit">提 交</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script charset="utf-8" src="https://map.qq.com/api/js?v=2.exp&key={$sysset_webinfo.map_key_qq}"></script>
  <script>
  layui.form.on('submit(formsubmit)', function(obj){
    var field = obj.field
    var index = layer.load();
    $.post("{:url('save')}",field,function(data){
      layer.close(index);
      dialog(data.msg,data.status);
      if(data.status == 1){
        setTimeout(function(){
          parent.layer.close(parent.layer.getFrameIndex(window.name));
          parent.tableIns.reload()
        },1000)
      }
    })
  })
  </script>
  {include file="public/copyright"/}
</body>
</html>
