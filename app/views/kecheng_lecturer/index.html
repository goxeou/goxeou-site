<!DOCTYPE html><!--custom_file(kecheng_lecturer)-->
<html>
<head>
  <meta charset="utf-8">
  <title>课程讲师管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header">课程讲师管理</div>
          <div class="layui-card-body" pad15>
            <div class="layui-col-md4" style="padding-bottom:10px">
              <a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url('edit')}')">添加</a>
              <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">删除</button>
              <!-- <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="setst(0,1)">开启</button>
              <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="setst(0,0)">关闭</button> -->
            </div>
            <div class="layui-form layui-col-md8 layui-form-search">
              <div class="layui-inline layuiadmin-input-useradmin">
                <label class="layui-form-label">姓名</label>
                <div class="layui-input-inline">
                  <input type="text" name="realname" autocomplete="off" class="layui-input">
                </div>
              </div>
              <div class="layui-inline">
                <label class="layui-form-label">审核状态</label>
                <div class="layui-input-inline">
                  <select name="checkstatus">
                    <option value="">全部</option>
                    <option value="-1">已驳回</option>
                    <option value="0">待审核</option>
                    <option value="1">已通过</option>
                  </select>
                </div>
              </div>
              <!-- <div class="layui-inline">
                <label class="layui-form-label">状态</label>
                <div class="layui-input-inline">
                  <select name="status">
                    <option value="">全部</option>
                    <option value="1">已开启</option>
                    <option value="0">已关闭</option>
                  </select>
                </div>
              </div> -->
              <div class="layui-inline">
                <button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
                  <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
                </button>
              </div>
            </div>
            <div class="layui-col-md12">
              <table id="tabledata" lay-filter="tabledata"></table>
            </div>
          </div>
        </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var table = layui.table;
  var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: true //开启分页
    ,cols: [[ //表头
      {type:"checkbox"},
      {field: 'id', title: 'ID',  sort: true,width:80},
      {field: 'nickname', title: '头像昵称',templet:function(d){
        if(d.nickname){
          return '<img src="'+d.headimg+'" style="width:40px;height:40px"/> '+ d.nickname
        }
        return '';
      }},
      {field: 'realname', title: '姓名'},
      {field: 'tel', title: '电话'},
      {field: 'commissionratio', title: '分佣(%)'},
      {field: 'mid', title: '{:t('会员')}ID'},
      {field: 'checkstatus', title: '审核状态',templet:function(d){
        var html = '';
        if(d.checkstatus==0){
          html += '<div style="color:red">待审核</div>';
        }else if(d.checkstatus==1){
          html += '<div style="color:green">已通过</div>';
        }else if(d.checkstatus==-1){
          html += '<div >已驳回</div>';
        }
        if(d.checkstatus!=1 && d.checkreason){
          html += '<div>驳回原因：'+d.checkreason+'</div>';
        }
        return html;
      }},
      // {field: 'status', title: '状态',templet:function(d){ 
      //   if(d.status==0){
      //     return '<span style="color:red">已关闭</span>';
      //   }else if(d.status==1){
      //     return '<span style="color:green">已开启</span>';
      //   }
      // }},
      {field: 'sort', title: '创建时间',templet:function(d){ return date('Y-m-d H:i',d.createtime)}},
      {field: 'operation', title: '操作',templet:function(d){
        var html = '';
        html += '<button class="table-btn"  onclick="openmax(\'{:url('edit')}/id/'+d.id+'\')">编辑</button>';
        html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button>';
        
        if(d.checkstatus == 0 || d.checkstatus == -1){
          html += '<button class="table-btn" onclick="setcheckst(\''+d.id+'\',1)">通过</button>';
        }
        if(d.checkstatus == 0 || d.checkstatus == 1){
          html += '<button class="table-btn" onclick="setcheckst('+d.id+',-1,'+d.checkstatus+')">驳回</button>';
        }
        // if(d.status == 0){
        //   html += '<button class="table-btn" onclick="setst('+d.id+',1)">开启</button>';
        // }else{
        //   html += '<button class="table-btn" onclick="setst('+d.id+',0)">关闭</button>';
        // }
        return html;
      }}
    ]]
  });
  //排序
  table.on('sort(tabledata)', function(obj){
    datawhere.field = obj.field;
    datawhere.order = obj.type;
    tableIns.reload({
      initSort: obj,
      where: datawhere
    });
  });
  //检索
  layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
    var field = obj.field
    var olddatawhere = datawhere
    datawhere = field
    datawhere.field = olddatawhere.field
    datawhere.order = olddatawhere.order
    tableIns.reload({
      where: datawhere,
      page: {curr: 1}
    });
  })
  //删除
  function datadel(id){
    var ids = [];
    if(id==0){
      var checkStatus = table.checkStatus('tabledata')
      var checkData = checkStatus.data; //得到选中的数据
      if(checkData.length === 0){
         return layer.msg('请选择数据');
      }
      for(var i=0;i<checkData.length;i++){
        ids.push(checkData[i]['id']);
      }
    }else{
      ids.push(id);
    }
    layer.confirm('确定要删除吗？删除后无法恢复！',{icon: 7, title:'操作确认'}, function(index){
      //do something
      layer.close(index);
      var index = layer.load();
      $.post("{:url('del')}",{ids:ids},function(data){
        layer.close(index);
        dialog(data.msg,data.status);
        tableIns.reload()
      })
    });
  }
  //开启
  function setst(id,st){
    var ids = [];
    if(id==0){
      var checkStatus = table.checkStatus('tabledata')
      var checkData = checkStatus.data; //得到选中的数据
      if(checkData.length === 0){
         return layer.msg('请选择数据');
      }
      for(var i=0;i<checkData.length;i++){
        ids.push(checkData[i]['id']);
      }
    }else{
      ids.push(id);
    }
    layer.confirm('确定要'+(st==0?'关闭':'开启')+'吗?',{icon: 7, title:'操作确认'}, function(index){
      //do something
      layer.close(index);
      var index = layer.load();
      $.post("{:url('setst')}",{ids:ids,st:st},function(data){
        layer.close(index);
        dialog(data.msg,data.status);
        tableIns.reload()
      })
    });
  }
   //审核
  function setcheckst(id,st,checkstatus = 0){
    if(st == -1){
        var html = '';
        html+=' <div class="layui-form-item" style="margin-top:40px;margin-right:20px;">';
        html+='   <label class="layui-form-label" style="width:80px">驳回原因</label>';
        html+='   <div class="layui-input-inline" style="width:350px">';
        html+='     <textarea type="text" id="check_reason" class="layui-textarea"></textarea>';
        html+='   </div>';
        html+=' </div>';
      if(checkstatus == 1){
        layer.confirm('确定要驳回吗?讲师已通过审核，此时驳回将删除讲师的后台管理员账号',{icon: 7, title:'操作确认'}, function(index){
          var checkLayer = layer.open({type:1,area:['500px','250px'],title:false,content:html,shadeClose:true,btn: ['确定', '取消'],
            yes:function(){
              var index = layer.load();
              $.post("{:url('setcheckst')}",{id:id,st:st,reason:$('#check_reason').val()},function(res){
                layer.close(index);
                dialog(res.msg,res.status);
                layer.close(checkLayer);
                tableIns.reload()
              })
            }
          })
        });
      }else{
        var checkLayer = layer.open({type:1,area:['500px','250px'],title:false,content:html,shadeClose:true,btn: ['确定', '取消'],
          yes:function(){
            var index = layer.load();
            $.post("{:url('setcheckst')}",{id:id,st:st,reason:$('#check_reason').val()},function(res){
              layer.close(index);
              dialog(res.msg,res.status);
              layer.close(checkLayer);
              tableIns.reload()
            })
          }
        })
      }
    }else{
      layer.confirm('确定要审核通过吗?',{icon: 7, title:'操作确认'}, function(index){
        layer.close(index);
        var index = layer.load();
        $.post("{:url('setcheckst')}",{id:id,st:st},function(data){
          layer.close(index);
          dialog(data.msg,data.status);
          tableIns.reload()
        })
      });
    }
  }
  function showqr(id){
    var pagepath = 'activity/peisong/orderlist';
    viewLink(pagepath);
  }
  </script>
  {include file="public/copyright"/}
</body>
</html>
