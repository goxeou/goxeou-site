<!DOCTYPE html><!--custom_file(product_weight)-->
<html>
<head>
  <meta charset="utf-8">
  <title>客户定价</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header">客户定价</div>
          <div class="layui-card-body" pad15>
			<div class="layui-col-md4" style="padding-bottom:10px">
				<a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="chooseProduct()">添加</a>
				<button class="layui-btn layui-btn-primary layuiadmin-btn-list" data-form-export="{:url('excel')}">导出</button>
				<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="daoru()">导入定价</button>
				<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">删除</button>
			</div>
			<div class="layui-form layui-col-md8 layui-form-search">
				<div class="layui-inline layuiadmin-input-useradmin">
					<div class="layui-input-inline" style="width:220px;">
						<input type="text" name="name" placeholder="商品名称" autocomplete="off" class="layui-input" value="">
					</div>
				</div>
				<div class="layui-inline">
					<label class="layui-form-label">客户</label>
					<div class="layui-input-inline" style="width: 200px">
						<select name="customer_id">
							<option value="">全部</option>
							{volist name="customerlist" id="customer"}
							<option value="{$customer.id}">{$customer.name}</option>
							{/volist}
						</select>
					</div>
				</div>
				<div class="layui-inline">
					<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
						<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
					</button>
				</div>
			</div>
			<div class="layui-col-md12">
				<table id="tabledata" lay-filter="tabledata"></table>
			</div>
          </div>
        </div>
    </div>
  </div>
  <script id="chooseProd" type="text/html">
	  <div class="selectprod">
		  <div class="layui-form-item">
			  <label class="layui-form-label">选择商品：</label>
			  <div class="layui-input-inline" style="width:50%">
				  <select class="layui-select" id="proids" name="proids" xm-select="proids" xm-select-search xm-select-radio>
					  {volist name="prolist" id="item"}
					  <option value="{$item.id}">{$item.name}{if $item.bname} ({$item.bname}){/if}</option>
					  {/volist}
				  </select>
			  </div>
		  </div>
	  </div>
  </script>
	{include file="public/js"/}
	<script>
  var table = layui.table;
	var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: true //开启分页
    ,cols: [[ //表头
			{type:"checkbox"},
      // {field: 'id', title: 'ID',  width:80},
		  {field: 'customer_id', title: '客户ID',width: 70},
		  {field: 'customer_name', title: '客户姓名'},
		  {field: 'customer_number', title: '客户编号',width: 100},
		  {field: 'bname', title: '销售商户'},
		  {field: 'show_name', title: '商品',width:180},
      {field: 'show_price', title: '价格',width: 120},
      // {field: 'createtime', title: '更新时间',templet:function(d){ return date('Y-m-d H:i',d.createtime)},width:150},
      {field: 'operation', title: '操作',templet: function (d){
      	var html = '<div>';
			html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button>';
			html += '<button class="table-btn" onclick="openmax(\'{:url('edit')}/isopen/1/id/'+d.id+'\')">编辑</button>';
			html += '</div>'
			return html
		},width:150}
    ]]
  });
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})
	//删除
	function datadel(id){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id);
		}
		layer.confirm('确定要删除吗？删除后无法恢复！',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('del')}",{ids:ids},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
  //筛选server模式

	function chooseProduct(){
		// layui.laytpl(chooseProd.innerHTML).render({}, function(html){
		var html = `<div class="layui-form"  style="padding-top: 30px">
						<div class="layui-form-item">
							<label class="layui-form-label">选择商品：</label>
							<div class="layui-input-inline" style="width:70%">
								<select class="layui-select" id="proids" name="proids" xm-select="proids" xm-select-search xm-select-radio>
								</select>
							</div>
						</div>
						<div class="layui-form-item" style="position: relative;top: 180px;left:0; ">
							<div class="layui-input-block" style="padding-left: 280px">
							<button class="layui-btn" lay-submit lay-filter="addsubmit">确定</button>
							</div>
						</div>
					</div>`;
			var detailLayer = layer.open({type:1,title:'客户定价',area:['500px','360px'],shadeClose:true,content:html,success:function (){
					var formSelects = layui.formSelects;
					formSelects.config('proids',{
						keyName:'name',
						keyVal:'id',
						searchUrl:"{:url('WeightOrder/searchProduct')}",
						searchName: 'keyword',
						searchVal:''
					})
					layui.form.render()
				},
				yes:function(){
					var proid  = $('#proids').val();
					console.log(proid)
				}
			});
		// })
	}
  layui.form.on('submit(addsubmit)', function(obj){
	  var field = obj.field
	  if(!field.proids){
		  layer.msg('请选择商品');return false;
	  }
	  window.location.href="{:url('add')}/proid/"+field.proids
  })

  function daoru(){
	  var html = '<div style="margin:20px auto;">';
	  html+='<div class="layui-form" lay-filter="">';
	  html+='	<div class="layui-form-item">';
	  html+='		<label class="layui-form-label" style="width:150px">上传EXCEL文件：</label>';
	  html+='		<div class="layui-input-inline" style="width:300px">';
	  html+='			<input type="text" name="upload_file" id="upload_file" class="layui-input">';
	  html+='		</div>';
	  html+='		<button style="float:left;" type="button" class="layui-btn layui-btn-primary uploadexcel" upload-input="upload_file" upload-preview="certPreview">上传</button>';
	  html+='	</div>';
	  html+='	<div class="layui-form-item">';
	  html+='		<label class="layui-form-label" style="width:150px"></label>';
	  html+='		<div class="layui-form-mid" style="color:red;">在导出的文件基础上完成价格调整，然后进行导入！</div>';
	  html+='	</div>';
	  html+='	<div class="layui-form-item" style="margin-top:30px">';
	  html+='		<label class="layui-form-label" style="width:150px"></label>';
	  html+='		<div class="layui-input-inline">';
	  html+='			<button class="layui-btn layui-btn-normal" lay-submit lay-filter="submit_excel">确定导入</button>';
	  html+='		</div>';
	  html+='	</div>';
	  html+='</div>';
	  html+='</div>'
	  var daorulayer = layer.open({type:1,area: ['600px', '360px'],title:'导入定价',content:html,shadeClose:true})
	  layui.form.render();
	  //文件上传
	  layui.upload.render({
		  elem: '.uploadexcel',
		  accept:'file',
		  url: "{:url('upload/index')}",
		  done: function(res){
			  if(res.status==0){
				  dialog(res.msg,0);
			  }else{
				  var item = this.item;
				  var inputid = $(this.item).attr('upload-input');
				  if(inputid){
					  $('#'+inputid).val(res.url);
					  $('#'+inputid).change();
				  }
			  }
		  }
	  });
	  layui.form.on('submit(submit_excel)', function(obj){
		  var field = obj.field;
		  field.proid = '{$Request.param.proid}'
		  console.log(field);
		  var index= layer.load();
		  $.post("{:url('importexcel')}",field,function(data){
			  layer.close(index);
			  layer.close(daorulayer);
			  dialog(data.msg,data.status);
			  tableIns.reload()
		  })
	  })
  }
	</script>
	{include file="public/copyright"/}
</body>
</html>
