<!DOCTYPE html><!--custom_file(product_weight)-->
<html>
<head>
  <meta charset="utf-8">
  <title>客户定价</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<style>
		.ggitem{display: flex;align-items: center;border: 1px solid #eeeeee;padding:15px}
		.ggname{text-align: center;width: 15%;}
		.ggtable{border-left: 1px solid #EEEEEE;padding-left: 20px;min-width: 400px}
		.bold{font-weight: bold}
		.price{font-weight: bold;color: #ff5700}
		.flextd{display: flex;align-items: center}

	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
				<div class="layui-card-header">
					<i class="fa fa-edit"></i> {$product.name}
					{if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}
				</div>
				<div class="layui-card-body">
					<div class="layui-form">
						<input type="hidden" name="proid" value="{$product.id}">
						<div class="layui-form-item">
							<label class="layui-form-label">选择客户：</label>
							<div class="layui-input-inline" style="width:50%">
								<select class="layui-select" id="ctmid" name="ctmid" xm-select="ctmid" xm-select-search>
									{volist name="customerlist" id="item"}
									<option value="{$item.id}">{$item.name}</option>
									{/volist}
								</select>
							</div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">客户定价：</label>
							<div class="layui-input-inline ggcontent" style="width:100%">
								{volist name="gglistArr" id="item"}
								<div class="ggitem" id="ggitem{$item.id}">
									<div class="ggname">
										<p>{$item.name}</p>
										<p class="price">￥{$item.sell_price}/{$item.weight}g</p>
									</div>
									<div class="ggtable">
										<table class="layui-table" width="100%" lay-skin="line">
											<thead>
											<tr id="tr0">
												<td width="30%">
													客户
												</td>
												<td>
													价格
												</td>
											</tr>
											</thead>
											<tbody>

											</tbody>
										</table>
									</div>
								</div>
								{/volist}
							</div>
						</div>
						<div class="layui-form-item" style="margin-top: 10px">
							<div class="layui-input-block" style="width: 100%;text-align: center">
								<button class="layui-btn" lay-submit lay-filter="formsubmit">确定</button>

							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
  </div>
  {include file="public/js"/}
	<script>
		var online = true;
		var isopen = {$isopen};
		console.log('isopen:'+isopen);
var gglist = {$gglist};
		console.log(gglist)

	layui.form.on('submit(formsubmit)', function(obj){
		var field = obj.field
		var index = layer.load();
		$.post("{:url('add')}",field,function(data){
			layer.close(index);
			layer.msg(data.msg)
			if(data.status == 1){
				if(isopen==1){
					setTimeout(function(){
						closeself()
					},1000)
				}else{
					parent.tableIns.reload()
				}
			}
		})
	})
		//筛选server模式
		var formSelects = layui.formSelects;
		formSelects.config('ctmid',{
			keyName:'name',
			keyVal:'id',
			searchUrl:"{:url('WeightOrder/searchCustomer')}",
			searchName: 'keyword',
			searchVal:''
		})
		var selectedArr = [];
		var selectedCtm= [];
		formSelects.on(function(id, inputVal, val, isDisabled){
			var newIdArr = [];
			var newArr = [];
			if(selectedArr.length>0 && $.inArray(parseInt(val.value),selectedArr)>-1){
				for(var i in selectedArr){
					if(val.value!=selectedArr[i]){
						newIdArr.push(parseInt(selectedArr[i]))
					}
				}
				for(var i in selectedCtm){
					if(val.value!=selectedCtm[i].value){
						newArr.push(selectedCtm[i])
					}
				}
				selectedArr = newIdArr;
				selectedCtm = newArr;
			}else{
				selectedCtm.push(val)
				selectedArr.push(parseInt(val.value))
			}
			refreshContent()
		});

		// formSelects.closed('ctmid',function(id){
		// 	refreshContent()
		// });

		function refreshContent(){
			for (var i in gglist){
				var trhtml = '';
				for (var j in selectedCtm){
					var price = gglist[i].sell_price;
					if($('#ggitem'+gglist[i].id).find('#ggtr_'+gglist[i].id+'_'+selectedCtm[j].value).length>0){
						price = $('#ggtr_'+gglist[i].id+'_'+selectedCtm[j].value).find('.price-input').val()
					}else{
						$.ajaxSettings.async = false;
						$.post("{:url('getCustomerPrice')}",{ggid:gglist[i].id,customer_id:selectedCtm[j].value},function(res){
							if(res.price>0){
								price = res.price;
							}
						})
					}
					trhtml +=`<tr id="ggtr_`+gglist[i].id+`_`+selectedCtm[j].value+`">
								<td class="bold">
									`+selectedCtm[j].name+`
								</td>
								<td>
									<input type="hidden" name="weight[]" value="`+gglist[i].weight+`">
									<input type="hidden" name="ggids[]" value="`+gglist[i].id+`">
									<input type="hidden" name="ctmids[]" value="`+selectedCtm[j].value+`">
									<input type="text" class="layui-input price-input" name="prices[]" value="`+price+`">
								</td>
							</tr>`
				}
				$('#ggitem'+gglist[i].id).find('.ggtable tbody').html(trhtml)
			}
		}
  </script>
	{include file="public/copyright"/}
</body>
</html>
