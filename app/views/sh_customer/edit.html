<!DOCTYPE html><!--custom_file(customer)-->
<html>
<head>
  <meta charset="utf-8">
  <title>客户</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<style>
		.flexc .min,.flexc .max{width: 120px;margin: 0 5px;float:left}
		.flexc span{width: 30px;float:left;text-align:center}
		.R-result th{font-weight: bold;font-size: 16px;text-align: center}
		.R-result textarea{margin-top: 5px}
	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
		<div class="layui-card-header">
			{if !$info['id']}<i class="fa fa-plus"></i> 添加客户{else}<i class="fa fa-pencil"></i> 编辑客户{/if}
			<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>
		</div>
		<div class="layui-card-body" pad15>
			<div class="layui-form form-label-w6" lay-filter="">
				<input type="hidden" name="info[id]" value="{$info.id}"/>
				<div class="layui-tab layui-tab-brief" lay-filter="mytab">
					<ul class="layui-tab-title">
						<li class="layui-this" lay-id="1">基本信息</li>
					</ul>
					<div class="layui-tab-content">
						<div class="layui-tab-item layui-show">
							<div class="layui-form-item">
								<label class="layui-form-label">所属客户：</label>
								<div class="layui-input-inline">
									<select class="layui-select" name="info[pid]" lay-filter="pid">
										<option value="">请选择</option>
										{volist name="customerlist" id="item"}
										<option value="{$item.id}" {if $item.id==$info.pid}selected{/if}>{$item.name}</option>
										{/volist}
									</select>
								</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">客户姓名：</label>
								<div class="layui-input-inline">
									<input type="text" name="info[name]" value="{$info.name}" lay-verify="required" lay-verType="tips" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">客户电话：</label>
								<div class="layui-input-inline">
									<input type="text" name="info[tel]" value="{$info.tel}" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">客户编号：</label>
								<div class="layui-input-inline">
									<input type="text" name="info[number]" value="{$info.number}"  autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">地址：</label>
								<div class="layui-input-inline" style="width: 30%">
									<input type="text" name="info[address]" value="{$info.address}" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">商户备注：</label>
								<div class="layui-input-inline" style="width: 30%">
									<textarea name="info[remark]" autocomplete="off" class="layui-textarea">{$info.remark}</textarea>
								</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">账期：</label>
								<div class="layui-input-inline" style="width: 100px">
									<input type="number" name="info[bill]" id="bill" value="{$info.bill|default=0}" autocomplete="off" class="layui-input">
								</div>
								<div class="layui-form-mid layui-word-aux">天</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">序号：</label>
								<div class="layui-input-inline" style="width: 100px">
									<input type="number" name="info[sort]" value="{$info.sort}"  autocomplete="off" class="layui-input">
								</div>
								<div class="layui-form-mid layui-word-aux">序号越大越靠前</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">会员ID：</label>
								<div class="layui-input-inline" style="width: 100px">
									<input type="number" name="info[mid]" id="mid" value="{$info.mid}"  autocomplete="off" class="layui-input">
								</div>
							</div>
							{if $bid==0}
							<div class="layui-form-item" id="ext_bids_box" {if !$info['id'] || $info['id']==0 || $info['pid']>0}style="display:none;"{/if}>
								<label class="layui-form-label">可用商户：</label>
								<div class="layui-input-inline" style="width:50%">
									<select class="layui-select" name="info[ext_bids]" xm-select="selectCid" xm-select-search>
										{volist name="businesslist" id="item"}
										<option value="{$item.id}" {if $info['ext_bids'] && in_array($item['id'],$info['ext_bids'])}selected{/if}>{$item.name}</option>
										{/volist}
									</select>
								</div>
							</div>
							{/if}
							{if getcustom('customer_peisonguser')}
							<div class="layui-form-item">
								<label class="layui-form-label">配送员：</label>
								<div class="layui-input-inline" style="width: 200px">
									<input type="text" id="peisong_uid" name="info[peisong_uid]" value="{$info.peisong_uid|default=0}"  autocomplete="off" class="layui-input">
								</div>
								<div class="layui-form-mid" id="peisong_uname">{$info.peisong_uname}</div>
								<div class="layui-input-inline"><button class="layui-btn layui-btn-primary" onclick="selectPeisongUser()">选择配送员</button></div>
							</div>
							{/if}
							<div class="layui-form-item">
								<label class="layui-form-label"></label>
								<div class="layui-input-block">
									<button class="layui-btn" lay-submit lay-filter="formsubmit">提 交</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		</div>
    </div>
  </div>
  {include file="public/js"/}
	<script>
	layui.form.on('submit(formsubmit)', function(obj){
		var field = obj.field
		var index = layer.load();
		$.post("{:url('save')}",field,function(data){
			layer.close(index);
			dialog(data.msg,data.status);
			if(data.status == 1){
				setTimeout(function(){
					parent.search()
				},1000)
			}
		})
	})

	layui.form.on('select(pid)', function(data){
		$.get("{:url('getDetail')}",{id:data.value},function(res){
			{if getcustom('customer_peisonguser')}
			$('#peisong_uname').text(res.data.peisong_uname)
			$('#peisong_uid').val(res.data.peisong_uid)
			{/if}
			$('#mid').val(res.data.mid);
			$('#bill').val(res.data.bill);
		})
		if(!data.value || data.value==0 || data.value==''){
			$('#ext_bids_box').show();
		}else{
			$('#ext_bids_box').hide();
		}
	})
	{if getcustom('customer_peisonguser')}
	var chooseGroupLayer;
	function selectPeisongUser(){
		chooseGroupLayer = layer.open({type:2,shadeClose:true,area:['920px', '560px'],'title':'选择配送员',content:"{:url('PeisongUser/choosepeisonguser')}"});
	}
	function choosepeisonguser(data,args){
		layer.close(chooseGroupLayer);
		$('#peisong_uname').text(data.realname)
		$('#peisong_uid').val(data.id)
	}
	{/if}
	</script>
	{include file="public/copyright"/}
</body>
</html>
