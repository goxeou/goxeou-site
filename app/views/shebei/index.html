          <div class="layui-card-body" pad15>

				<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">删除</button>
				<a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url('edit')}')">添加</a>

				<!--<button class="layui-btn layuiadmin-btn-list" onclick="setfh(0)">分红</button>-->
			</div>
			<div class="layui-form layui-col-md9" style="text-align:right;padding-bottom:10px">
				<div class="layui-inline layuiadmin-input-useradmin">
					<label class="layui-form-label" style="width:60px">{:t('会员')}ID</label>
					<div class="layui-input-block" style="width:120px;margin-left:90px">
						<input type="text" name="mid" autocomplete="off" class="layui-input" value="{$Request.param.mid}">
					</div>
				</div>
				<div class="layui-inline layuiadmin-input-useradmin">

						<input type="text" name="nickname" autocomplete="off" class="layui-input" value="">
					</div>
				</div>
				<div class="layui-inline layuiadmin-input-useradmin">
					<label class="layui-form-label" style="width:60px">订单编号</label>
					<div class="layui-input-block" style="width:120px;margin-left:90px">

					</div>
				</div>
				<div class="layui-inline">
					<label class="layui-form-label" style="width:30px">状态</label>
					<div class="layui-input-block" style="width:120px;margin-left:60px;text-align:left">
						<select name="status">
							<option value="">全部</option>
							<option value="0">分红中</option>
							<option value="1">已完成</option>
						
						</select>
					</div>
				</div>
				<div class="layui-inline">

				</div>
			</div>
			<div class="layui-col-md12">

			if(!d.headimg) return '';
			var html = '<img src="'+d.headimg+'" style="height:30px"/> '+d.nickname;
			html += '<span style="color:#f55;font-weight:600"> '+d.mid+'</span>';
			return html;

			if(d.status==0){
				return '<span style="color:#000">分红中</span>';
			}else if(d.status==1){
				return '<span style="color:green">已完成</span>';
			}
		}},

			var html = '';
			html += '<button class="layui-btn layui-btn-normal layui-btn-sm" onclick="openmax(\'{:url('edit')}/id/'+d.id+'\')">编辑</button>';
			html += '<button class="layui-btn layui-btn-normal layui-btn-sm"  onclick="datadel('+d.id+')">删除</button>';

	//删除
	function datadel(id){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id);
		}
		layer.confirm('确定要删除吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('del')}",{ids:ids},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
	//上下架
	function setst(id,st){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id);
		}
		layer.confirm('确定要'+(st==0?'关闭':'开启')+'吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('setst')}",{ids:ids,st:st},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
