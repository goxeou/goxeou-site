<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>代理商</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header"><i class="fa fa-list"></i> 代理商
						{if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}</div>
           <div class="layui-card-body" pad15>
						<div class="layui-col-md6" style="padding-bottom:10px">
							<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">删除</button>
							<a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url('edit')}')">添加</a>
					
						</div>
						<div class="layui-form layui-col-md6" style="text-align:right;padding-bottom:10px">
							<div class="layui-inline layuiadmin-input-useradmin">
								<label class="layui-form-label" style="width:60px">{:t('会员')}ID</label>
								<div class="layui-input-block" style="width:120px;margin-left:90px">
									<input type="text" name="mid" autocomplete="off" class="layui-input" value="{$Request.param.mid}">
								</div>
							</div>
							<div class="layui-inline layuiadmin-input-useradmin">
								<label class="layui-form-label" style="width:60px">昵称</label>
								<div class="layui-input-block" style="width:120px;margin-left:90px">
									<input type="text" name="nickname" autocomplete="off" class="layui-input" value="">
								</div>
							</div>
							<div class="layui-inline">
								<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
									<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
								</button>
							</div>
						</div>
						<div class="layui-col-md12">
							<table id="tabledata" lay-filter="tabledata"></table>
						</div>
          </div>
        </div>
    </div>
  </div>
  
	{include file="public/js"/}
	<script>
	layui.laydate.render({ 
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
  var table = layui.table;
	var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: true //开启分页
    ,cols: [[ //表头
			{type:"checkbox"},
      //{field: 'id', title: 'ID',sort:true,width:80},
      {field: 'mid', title: '{:t('会员')}ID',width:80},
      {field: 'nickname', title: '{:t('会员')}信息',templet:'<div>{{# if(d.nickname){ }}<img src="{{d.headimg}}" style="width:50px"> {{d.nickname}}{{# } }}</div>'},
       {field: 'name', title: '姓名',sort:true,width:120},
       {field: 'tel', title: '电话',sort:true,width:120},
       
        {field: 'type', title: '类型',templet:function(d){
			if(d.type==1){
				return '<span style="cursor:pointer;">省代</span>' + '<br>' +  d.province ;
			}else if(d.type==2){
				return '<span style="cursor:pointer;">市代</span>' + '<br>' +  d.province + '-'+d.city;
			}else if(d.type==3){
				return '<span style="cursor:pointer;">县/区代</span>' + '<br>' +  d.province + '-'+ d.city + '-'+ d.area;
			}
		}},
    
		{field: 'rate1',width:120, title: '补贴',},
	
	   {field: 'status', title: '状态',templet:function(d){
			if(d.status==0){
				return '<span style="cursor:pointer;color:red">待审核</span>';
			}else if(d.status==1){
				return '<span style="cursor:pointer;color:green">已通过</span>';
			}else if(d.status==2){
				return '<span style="cursor:pointer;">已驳回</span>';
			}
		}},
      {field: 'createtime', title: '申请时间',sort:true,templet:function(d){ return date('Y-m-d H:i',d.createtime)}},
     
     {field: 'operation', title: '操作',templet: '<div>{{# if(d.status==0 || d.status==2){ }}<button class="table-btn" onclick="shenhe({{d.id}},1)">通过</button><button class="table-btn" onclick="shenhe({{d.id}},2)">驳回</button>{{# } }}<button class="table-btn" onclick="datadel({{d.id}})">删除</button><button class="table-btn" onclick="openmax(\'{:url(edit)}/id/{{d.id}}\')">编辑</button></div>'}
 //  {{# if(d.status==1){ }}<button class="table-btn" onclick="recharge({{d.id}})">设置提成比例</button>{{# } }}
    ]]
  });
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})
	var rechargelayer
	function recharge(id){
		$('#rechargemid').val(id);
		rechargelayer = layer.open({type:1,area: ['500px', '400px'],title:'{:t('余额')}充值',content:$('#rechargeModel'),shadeClose:true})
	}
		//充值提交
       layui.form.on('submit(formRecharge)', function(obj){
		var index= layer.load();
        $.post("{:url('recharge')}",obj.field,function(data){
    			layer.close(index);
    			dialog(data.msg,data.status,data.url);
    			if(data.status==1){
    				tableIns.reload({
    					where: datawhere
    				});
    			}
    			layer.close(rechargelayer);
    		})
      });
	function shenhe(id,st){
		layer.confirm('确定要'+(st==1?'审核通过':'驳回')+'吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index= layer.load();
			$.post("{:url('applyshenhe')}",{id:id,st:st,type:'dai'},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				if(data.status==1){
					tableIns.reload({
						where: datawhere
					});
				}
			})
		})
	}
	//删除
	function datadel(id){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			var ids = [];
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id)
		}
		layer.confirm('确定要删除吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('applydel')}",{ids:ids,type:'dai'},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}

	</script>
	{include file="public/copyright"/}
</body>
</html>
