<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{:t('会员')}编辑</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<script src="__STATIC__/admin/js/address3.js"></script>
	<style>
		.layui-form-label{width:130px!important}
	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
			<div class="layui-card layui-col-md12">
				<div class="layui-card-header"><i class="fa fa-edit"></i> {:t('会员')}编辑<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i></div>
        <div class="layui-card-body" pad15>
					<div class="layui-form" lay-filter="form">
						<input type="hidden" name="info[id]" value="{$info.id}"/>
						<div class="layui-tab layui-tab-brief" lay-filter="mytab">
						<div class="layui-tab-content">
						<div class="layui-tab-item layui-show">
						<div class="layui-form-item">
							<label class="layui-form-label">会员id</label>
							<div class="layui-input-inline">
								<input type="text" name="info[mid]" class="layui-input" value="{$info.mid}">
							</div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">姓名</label>
							<div class="layui-input-inline">
								<input type="text" name="info[name]" class="layui-input" value="{$info.name}">
							</div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">手机号</label>
							<div class="layui-input-inline">
								<input type="text" name="info[tel]" class="layui-input" value="{$info.tel}">
							</div>
						</div>
					
						<div class="level-box">
						    <div class="layui-form-item">
								<label class="layui-form-label">区域代理</label>
								<div class="layui-input-inline" style="width:700px">
									<!--<input type="radio" name="info[type]" value="1" lay-filter="typeChange" {if $info['type']==1}checked{/if} title="省级代理"/>-->
									<input type="radio" name="info[type]" value="2" lay-filter="typeChange" {if $info['type']==2}checked{/if} title="市级代理"/>
									<input type="radio" name="info[type]" value="3" lay-filter="typeChange" {if $info['type']==3}checked{/if} title="区县代理"/>
									<!--<input type="radio" name="info[areafenhong]" value="4" lay-filter="areafenhongChange" {if $info['areafenhong']==4}checked{/if} title="非区域代理"/>-->
								</div>
							</div>
							<div class="layui-form-item">
								<label class="layui-form-label">状态</label>
								<div class="layui-input-inline" style="width:700px">
									<input type="radio" name="info[status]" value="0" {if $info['status']==0}checked{/if} title="待审核"/>
									<input type="radio" name="info[status]" value="1" {if $info['status']==1}checked{/if} title="已审核"/>
									<input type="radio" name="info[status]" value="2"  {if $info['status']==2}checked{/if} title="驳回"/>
						
								</div>
							</div>
							<div class="layui-form-item " >
								<label class="layui-form-label">代理区域</label>
								<div class="layui-input-inline area_province_div" {if $info['type']==0 }style="display:none"{/if}>
									<select name="info[province]" id="province" lay-filter="province"></select>
								</div>
								<div class="layui-input-inline area_city_div" {if  $info['type']==1}style="display:none"{/if}>
									<select name="info[city]" id="city" lay-filter="city"></select>
								</div>
								<div class="layui-input-inline area_area_div" {if $info['type']==2 || $info['type']==1}style="display:none"{/if}>
									<select name="info[area]" id="area"></select>
								</div>
							</div>
							<!--<div class="layui-form-item cityfenhong_bili" >-->
							<!--	<label class="layui-form-label">分红</label>-->
							<!--	<div class="layui-input-inline">-->
							<!--		<input type="text" name="info[city_rate]" class="layui-input" value="{$info.city_rate}">-->
							<!--	</div>-->
							<!--	<div class="layui-form-mid">%</div>-->
    			<!--			</div>-->
    						<div class="layui-form-item areafenhong_bili" >
    								<label class="layui-form-label">补贴</label>
    								<div class="layui-input-inline">
    									<input type="text" name="info[rate1]" class="layui-input" value="{$info.rate1}">
    								</div>
    								<div class="layui-form-mid">元</div>
    							</div>
    						</div>
    						
						<!--<div class="layui-form-item">-->
						<!--	<label class="layui-form-label">备注</label>-->
						<!--	<div class="layui-input-inline">-->
						<!--		<input type="text" name="info[remark]" class="layui-input" value="{$info['remark']}">-->
						<!--	</div>-->
						<!--</div>-->
  					</div>
					<div class="layui-form-item">
					  <label class="layui-form-label"></label>
					  <div class="layui-input-block">
						  <button class="layui-btn" lay-submit lay-filter="edit">确认修改</button>
					  </div>
					</div>
					</div>
			   </div>
			</div>
		</div>
	</div>
</div>
</div>
  {include file="public/js"/}
	<script>
	var defaultlevelid = "{$defaultlevel['id']}";
	
	layui.form.on('radio(typeChange)',function(data){
		typeChange(this);
	});
	function typeChange(e){
		var formdata = layui.form.val('form');
		var type = $(e).val();
		var parent = $(e).parents('.level-box');
		if(type==0  || type==1 || type==2 || type==3 ){
			parent.find('.area_province_div').hide();
			parent.find('.area_city_div').hide();
			parent.find('.area_area_div').hide();
			
			if( type==1){
				parent.find('.area_province_div').show();
			}
			if( type==2){
				parent.find('.area_province_div').show();
				parent.find('.area_city_div').show();
			}
			if( type == 3){
				parent.find('.area_province_div').show();
				parent.find('.area_city_div').show();
				parent.find('.area_area_div').show();
			}
		}
		if(areafenhong==0){
			parent.find('.areafenhong_bili').hide();
		}else{
			parent.find('.areafenhong_bili').show();
		}
	}
	
	
	
	
	
	
	
	
	
	address3('province','city','area',"{$info.province}","{$info.city}","{$info.area}");
	layui.form.on('submit(edit)', function(obj){
		var field = obj.field
		var index = layer.load();
		$.post("{:url('save')}",obj.field,function(data){
			layer.close(index);
			dialog(data.msg,data.status);
			if(data.status == 1){
				setTimeout(function(){
					parent.layer.closeAll();
					parent.tableIns.reload()
				},1000)
			}
		})
	})
  </script>
	{include file="public/copyright"/}
</body>
</html>
