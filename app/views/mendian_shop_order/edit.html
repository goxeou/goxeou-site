<!--custom_file(fenhong_jiaquan_bylevel)--><!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>门店收款</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<style>
	.layui-form-label{width: 120px}
	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
				<div class="layui-card-header">
					{if !$info['id']}<i class="fa fa-plus"></i> 添加门店收款{else}<i class="fa fa-pencil"></i> 编辑门店收款{/if}
					<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>
				</div>
				<div class="layui-card-body" pad15>
					<blockquote class="layui-elem-quote">每天 <span style="font-weight: bold">{$adminset.fenhong_jqjs_time}</span> 结算前一天的加权分红，请务必在此时间之前添加门店收款数据</blockquote>
					<div class="layui-form">
						<input type="hidden" name="info[id]" value="{$info.id}"/>
						<div class="layui-form-item">
							<label class="layui-form-label">标题：</label>
							<div class="layui-input-inline" style="width: 260px;">
								<input type="text" name="info[title]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.title}">
							</div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">收款日期：</label>
							<div class="layui-input-inline">
								<input type="text" style="background: #eee" disabled name="info[date]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.date}">
							</div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">收款总金额：</label>
							<div class="layui-input-inline">
								<input type="text" name="info[totalprice]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.totalprice}">
							</div>
							<div class="layui-form-mid layui-word-aux">元，请在次日结算前填写昨日收款总金额</div>
						</div>
						<div class="layui-form-item">
							<label class="layui-form-label">备注：</label>
							<div class="layui-input-inline" style="width: 260px">
								<textarea name="info[remark]" class="layui-textarea">{$info.remark}</textarea>
							</div>
						</div>
						<div class="layui-form-item">
							<div class="layui-input-block">
								<button class="layui-btn layui-btn-danger" lay-submit lay-filter="formsubmit">提 交</button>
							</div>
						</div>
					</div>
				</div>
			</div>
    </div>
  </div>
  {include file="public/js"/}
<script>
layui.form.on('submit(formsubmit)', function(obj){
	var field = obj.field
	var index = layer.load();
	$.post("{:url('save')}",field,function(data){
		layer.close(index);
		dialog(data.msg,data.status);
		if(data.status == 1){
			setTimeout(function(){
				parent.layer.close(parent.layer.getFrameIndex(window.name));
				parent.tableIns.reload()
			},1000)
		}
	})
})
</script>
</body>
</html>
