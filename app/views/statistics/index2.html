<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>数据统计</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header"><i class="fa fa-list"></i> 数据统计
				{if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}</div>
                     <div class="layui-card-body" pad18>
                        
                        <div class="layui-row layui-col-space18">
                            <div class="layui-col-sm6 layui-col-md2" >
                                <div class="layui-card" >
                                    <div class="layui-card-header" >
                                        总营业额（元）
                                    </div>
                                    <div class="layui-card-body layuiadmin-card-list" >
                                        <p class="layuiadmin-big-font" >{$total['totalprice']}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="layui-col-sm6 layui-col-md2">
                                <div class="layui-card">
                                    <div class="layui-card-header">
                                       总积分
                                    </div>
                                    <div class="layui-card-body layuiadmin-card-list">
                                        <p class="layuiadmin-big-font" >{$total['tongji_1']}</p>
                                    </div>
                                </div>
                            </div>
                           
                   </div>
                        <div class="layui-form layui-col-md12" style="text-align:right;padding-bottom:10px">
						
                            	<div class="layui-form layui-form-search" style="float:right;">
								<!--<div class="layui-inline">-->
								<!--	<label class="layui-form-label">{:t('会员')}ID</label>-->
								<!--	<div class="layui-input-inline">-->
								<!--		<input type="text" name="mid" value="{$Request.param.mid}" autocomplete="off" class="layui-input">-->
								<!--	</div>-->
								<!--</div>-->
								<div class="layui-inline">
									<label class="layui-form-label">年份</label>
									<div class="layui-input-inline">
										<select name="year">
											<option value="{:date('Y')}">{:date('Y')}</option>
											<option value="{:intval(date('Y')-1)}">{:intval(date('Y')-1)}</option>
											<option value="{:intval(date('Y')-2)}">{:intval(date('Y')-2)}</option>
											<option value="{:intval(date('Y')-3)}">{:intval(date('Y')-3)}</option>
											<option value="{:intval(date('Y')-4)}">{:intval(date('Y')-4)}</option>
											<option value="{:intval(date('Y')-5)}">{:intval(date('Y')-5)}</option>
											<option value="{:intval(date('Y')-6)}">{:intval(date('Y')-6)}</option>
											<option value="{:intval(date('Y')-7)}">{:intval(date('Y')-7)}</option>
											<option value="{:intval(date('Y')-8)}">{:intval(date('Y')-8)}</option>
											<option value="{:intval(date('Y')-9)}">{:intval(date('Y')-9)}</option>
											<option value="{:intval(date('Y')-10)}">{:intval(date('Y')-10)}</option>
										</select>
									</div>
								</div>
								<div class="layui-inline">
									<label class="layui-form-label">月份</label>
									<div class="layui-input-inline">
										<select name="month">
											<option value="0" >全部</option>
											<option value="1" {if date('m')==1}selected{/if}>1月</option>
											<option value="2" {if date('m')==2}selected{/if}>2月</option>
											<option value="3" {if date('m')==3}selected{/if}>3月</option>
											<option value="4" {if date('m')==4}selected{/if}>4月</option>
											<option value="5" {if date('m')==5}selected{/if}>5月</option>
											<option value="6" {if date('m')==6}selected{/if}>6月</option>
											<option value="7" {if date('m')==7}selected{/if}>7月</option>
											<option value="8" {if date('m')==8}selected{/if}> 8月</option>
											<option value="9" {if date('m')==9}selected{/if}>9月</option>
											<option value="10" {if date('m')==10}selected{/if}>10月</option>
											<option value="11" {if date('m')==11}selected{/if}>11月</option>
											<option value="12" {if date('m')==12}selected{/if}>12月</option>
										</select>
									</div>
								</div>
								
								<div class="layui-inline">
									<label class="layui-form-label">日期</label>
									<div class="layui-input-inline">
										<select name="day">
											<option value="">全部</option>
											{for start="1" end="31"}
											<option value="{$i}">{$i}日</option>
											{/for}
										</select>
									</div>
								</div>
							
								<div class="layui-inline">
									<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
										<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
									</button>
								</div>
							</div>
						</div>
						<div class="layui-col-md12">
							<table id="tabledata" lay-filter="tabledata"></table>
						</div>
          </div>
        </div>
    </div>
  </div>
	{include file="public/js"/}
	<script>
	layui.laydate.render({ 
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
  var table = layui.table;
	var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: false //开启分页
    ,cols: [[ //表头
        {field: 'date', title: '月份',width:200},
	
    	{field: 'totalprice', align:"center",title: '营业额',templet:function(d){
			return  (d.totalprice>0 ? d.totalprice : '')
        }},
    	{field: 'tongji_1', align:"center",title: '{:t('积分')}',templet:function(d){
			return  (d.tongji_1>0 ? d.totalprice : '')
       }},
        
        
    ]]
  
  });
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});

	//日期范围选择
	layui.laydate.render({
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
		
		//日期范围选择
	layui.laydate.render({
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
	
	 //日期时间范围
        layui.laydate.render({
            elem: '#start_time'
            , type: 'datetime'
            ,theme: '#1E9FFF'
            , value: "{$today[0]}"
        });

         layui.laydate.render({
            elem: '#end_time'
            , type: 'datetime'
            ,theme: '#1E9FFF'
            ,value: "{$today[1]}"
        });

	 $('.day').click(function(){
            $('.day').removeClass('layui-btn-normal');
            $('.day').removeClass('layui-btn-primary');
            $('.day').addClass('layui-btn-primary');
            $(this).removeClass('layui-btn-primary');
            $(this).addClass('layui-btn-normal');
            var day = $(this).attr('day');
            switch (day) {
                case '-1':
                    $('#start_time').val('{$yesterday[0]}');
                    $('#end_time').val('{$yesterday[1]}');
                    break;
                case '1':
                    $('#start_time').val('{$today[0]}');
                    $('#end_time').val('{$today[1]}');
                    break;
                case '7':
                    $('#start_time').val('{$days_ago7[0]}');
                    $('#end_time').val('{$days_ago7[1]}');
                    break;
                case '30':
                    $('#start_time').val('{$days_ago30[0]}');
                    $('#end_time').val('{$days_ago30[1]}');
                    break;
            }
     });
    function addmoney(id){
		var html = '';
		html+='	<div class="layui-form-item" style="margin-top:40px;margin-right:20px;">';
		html+='		<label class="layui-form-label" style="width:80px">分红金额：</label>';
		html+='		<div class="layui-input-inline" style="width:180px">';
		html+='			<input type="text" id="addfhmoney" class="layui-input"/>';
		html+='		</div>';
		html+='		<div class="layui-form-mid layui-word-aux">输入分红金额</div>';
		html+='	</div>';
		var addcredit1Layer = layer.open({type:1,area:['500px','300px'],title:false,content:html,shadeClose:true,btn: ['确定', '取消'],
			yes:function(){
				var index = layer.load();
				$.post("{:url('addmoney')}",{id:id,money:$('#addfhmoney').val()},function(res){
					layer.close(index);
					dialog(res.msg,res.status);
					layer.close(addcredit1Layer);
					tableIns.reload()
				})
			}
		})
	}
	function setst(id){
		var html = '';
		html+='	<div class="layui-form-item" style="margin-top:40px;margin-right:20px;">';
		html+='		<label class="layui-form-label" style="width:140PX">确定要发放分红吗？</label>';
     	html+='		';
		html+='	</div>';
		var setstLayer = layer.open({type:1,area:['500px','200px'],title:false,content:html,shadeClose:true,btn: ['确定', '取消'],
			yes:function(){
				var index = layer.load();
				$.post("{:url('addlrfh')}",{id:id},function(res){
					layer.close(index);
					dialog(res.msg,res.status);
					layer.close(setstLayer);
					tableIns.reload()
				})
			}
		})
	}
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere
		});
		console.log(field);
		if(field.month != ''){
			$('.laytable-cell-1-0-0').text('日期');
		}else{
			$('.laytable-cell-1-0-0').text('月份');
		}
		
	})
	//检索
// 	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
// 		var field = obj.field
// 		var olddatawhere = datawhere
// 		datawhere = field
// 		datawhere.field = olddatawhere.field
// 		datawhere.order = olddatawhere.order
// 		tableIns.reload({
// 			where: datawhere,
// 			page: {curr: 1}
// 		});
	
// 	})
		//删除
	function datadel(id){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			var ids = [];
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id)
		}
		layer.confirm('确定要删除吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('scorelogdel')}",{ids:ids},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
	</script>
	{include file="public/copyright"/}
</body>
</html>
