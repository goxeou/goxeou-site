  <title>实体门店管理</title>
  <meta name="renderer" content="webkit">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header">实体门店管理{if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}</div>
          <div class="layui-card-body" pad15>
			<blockquote class="layui-elem-quote">用于自提订单选择自提门店进行到店自提</blockquote>
			  {if $mendian_num_limit > 0}<blockquote class="layui-elem-quote">门店数量上限：{$mendian_num_limit}</blockquote>{/if}
			<div class="layui-col-md4" style="padding-bottom:10px">
				<a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url('edit2')}')">添加</a>
				<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">删除</button>
		
			</div>
			<div class="layui-form layui-form-search layui-col-md8 ">
				<div class="layui-inline">
					<label class="layui-form-label">名称</label>
					<div class="layui-input-inline">
						<input type="text" name="name" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-inline">
					<label class="layui-form-label">状态</label>
					<div class="layui-input-inline">
						<select name="status">
							<option value="">全部</option>
							<option value="1">已开启</option>
							<option value="0">已关闭</option>
						</select>
					</div>
				</div>
				<div class="layui-inline">
					<label class="layui-form-label">审核状态</label>
					<div class="layui-input-inline">
						<select name="check_status">
							<option value="">全部</option>
							<option value="0">待审核</option>
							<option value="1">已通过</option>
							<option value="2">已驳回</option>
						</select>
					</div>
				</div>
				<div class="layui-inline">
					<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
						<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
					</button>
				</div>
			</div>
			<div class="layui-col-md12">
				<table id="tabledata" lay-filter="tabledata"></table>
			</div>
    </div>
  </div>
  </div>
	</div>
	<div id="ywtimeModel" style="width:800px;display:none;margin-top:30px">
		<div class="layui-form" lay-filter="">
			<input type="hidden" name="mdid" id="mdid"/>
        	<div class="layui-form-item">
				<label class="layui-form-label" style="width: 100px">产品:</label>
				<div class="layui-input-inline" style="width:600px">
    				<select name="cids" id="cid" xm-select="selectCid" xm-select-max="25" xm-select-search >
    					<option value="">--请选择--</option>
    					{foreach $pro_data as $cv}
    					   <option value="{$cv['id']}" >{$cv['name']}</option>
    				
    					{/foreach}
    				</select>
				</div>
			</div>
			<div class="layui-form-item">
				<label class="layui-form-label" style="width: 100px">库存:</label>
				<div class="layui-input-inline" style="width:300px">
					<input type="number" name="stock" id="stock" required lay-verify="required" placeholder="" autocomplete="off" class="layui-input" >
				</div>
				<div class="layui-form-mid layui-word-aux">输入负值表示扣除</div>
			</div>

			<div class="layui-form-item">
				<label class="layui-form-label" style="width: 100px">备注:</label>
				<div class="layui-input-inline" style="width:500px">
					<input type="text" name="remark" id="remark" placeholder="" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item">
				<div class="layui-input-block" >
					<button class="layui-btn layui-btn-normal" lay-submit lay-filter="formywtime">确定</button>
				</div>
			</div>
		</div>
	</div>
	{include file="public/js"/}
	<script>
  var table = layui.table;
	var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: true //开启分页
    ,cols: [[ //表头
			{type:"checkbox"},
      {field: 'id', title: 'ID',  sort: true,width:80},
      {field: 'name',  width:220,title: '门店名称'},
		  	  
      {field: 'pic', width:100,title: '门店图片',templet:function(d){return '<img src="'+d.pic+'" style="width:50px;"/>';}},
      {field: 'address',width:280, title: '门店电话/地址',templet:function(d){return '<div>'+d.tel+'</div><div>'+d.province+d.city+d.district+d.address+'</div>';}},
	  {field: 'nickname',width:180, title: '头像昵称',templet:function(d){
				if(!d.nickname) return '';
				return '<img src="'+d.headimg+'" style="width:40px;height:40px"/> '+d.nickname +  '【'+d.mid +'】';
      }},
      {field: 'sort', title: '创建时间',templet:function(d){ return date('Y-m-d H:i',d.createtime)}},
       {field: 'status', title: '状态',templet:function(d){ 
				if(d.status==0){
					return '<span style="color:red">已关闭</span>';
				}else if(d.status==1){
					return '<span style="color:green">已开启</span>';
				}
			}},
       {field: 'status', title: '审核状态',templet:function(d){ 
				if(d.check_status==0){
					return '<span style="color:red">待审核</span>';
				}else if(d.check_status==1){
					return '<span style="color:green">已通过</span>';
				}else if(d.check_status==2){
					return '<span style="color:red">已驳回</span>';
				}
			}},
		{field: 'operation',width:260, title: '操作',templet:function(d){
			var html = '';
			html += '<button class="table-btn" onclick="openmax(\'{:url('edit2')}/id/'+d.id+'\')">编辑</button>';
			html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button>';
			if(d.check_status == 0 || d.check_status == 2){
				html += '<button class="table-btn" onclick="setcheckst(\''+d.id+'\',1)">通过</button>';
			}
			if(d.check_status == 0 || d.check_status == 1){
				html += '<button class="table-btn" onclick="setcheckst(\''+d.id+'\',2)">驳回</button>';
			}
	     	//html += '<button class="table-btn"  onclick="openmax(\'{:url('MendianPro/add')}/id/'+d.id+'\')">产品管理</button>';
			return html;
        }}

    ]]
  });
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})
	var setywtimelayer
	function addstock(id){
		$('#mdid').val(id);
		setywtimelayer = layer.open({type:1,area: ['800px', '700px'],title:'添加产品库存',content:$('#ywtimeModel'),shadeClose:true})
	}
	//余额宝收益率、提现天数
	layui.form.on('submit(formywtime)', function(obj){
		var index= layer.load();
		$.post("{:url('addstock')}",obj.field,function(data){
			layer.close(index);
			dialog(data.msg,data.status,data.url);
			if(data.status==1){
				tableIns.reload({
					where: datawhere
				});
			}
			layer.close(setywtimelayer);
		})
	});
	//审核
	function setcheckst(id,st){
		if(st == 2){
			var html = '';
			html+='	<div class="layui-form-item" style="margin-top:40px;margin-right:20px;">';
			html+='		<label class="layui-form-label" style="width:80px">驳回原因</label>';
			html+='		<div class="layui-input-inline" style="width:350px">';
			html+='			<textarea type="text" id="check_reason" class="layui-textarea"></textarea>';
			html+='		</div>';
			html+='	</div>';
			var checkLayer = layer.open({type:1,area:['500px','250px'],title:false,content:html,shadeClose:true,btn: ['确定', '取消'],
				yes:function(){
					var index = layer.load();
					$.post("{:url('setcheckst')}",{id:id,st:st,reason:$('#check_reason').val()},function(res){
						layer.close(index);
						dialog(res.msg,res.status);
						layer.close(checkLayer);
						tableIns.reload()
					})
				}
			})
		}else{
			layer.confirm('确定要审核通过吗?',{icon: 7, title:'操作确认'}, function(index){
				layer.close(index);
				var index = layer.load();
				$.post("{:url('setcheckst')}",{id:id,st:st},function(data){
					layer.close(index);
					dialog(data.msg,data.status);
					tableIns.reload()
				})
			});
		}
	}

	function datadel(id){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id);
		}
		layer.confirm('确定要删除吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('del')}",{ids:ids},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
	//上下架
	function setst(id,st){
		var ids = [];
		if(id==0){
			var checkStatus = table.checkStatus('tabledata')
			var checkData = checkStatus.data; //得到选中的数据
			if(checkData.length === 0){
				 return layer.msg('请选择数据');
			}
			for(var i=0;i<checkData.length;i++){
				ids.push(checkData[i]['id']);
			}
		}else{
			ids.push(id);
		}
		layer.confirm('确定要'+(st==0?'关闭':'开启')+'吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('setst')}",{ids:ids,st:st},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
