<html>
<head>
  <meta charset="utf-8">

  <meta name="renderer" content="webkit">

	#ggnamediv .layui-input,#ggvaldiv .layui-input{ display:inline;height:30px}
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header">数造商户</div>
          <div class="layui-card-body" pad15>
						<div class="layui-col-md5" style="padding-bottom:10px">
							<!--<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="setst(0,1)">上架</button>-->
							<!--<button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="setst(0,0)">下架</button>-->
						</div>
						<div class="layui-form layui-col-md7" style="text-align:right;padding-bottom:10px">
							<!--<div class="layui-inline layuiadmin-input-useradmin">-->
							<!--	<label class="layui-form-label" style="width:60px">商品名称</label>-->
							<!--	<div class="layui-input-block" style="width:120px;margin-left:90px">-->
							<!--		<input type="text" name="name" autocomplete="off" class="layui-input">-->
							<!--	</div>-->
							<!--</div>-->
						
							<!--<div class="layui-inline">-->
							<!--	<label class="layui-form-label" style="width:60px;">发起时间</label>-->
							<!--	<div class="layui-input-block" style="width:180px;margin-left:90px">-->
							<!--		<input type="text" name="ctime" id="ctime" autocomplete="off" class="layui-input">-->
							<!--	</div>-->
							<!--</div>-->
						
							<div class="layui-inline">
								<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
									<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
								</button>
							</div>
						</div>
						<div class="layui-col-md12">
							<table id="tabledata" lay-filter="tabledata"></table>
						</div>
          </div>
        </div>
    </div>
  </div>
	{include file="public/js"/}
	<script>
		layui.laydate.render({ 
		elem: '#ctime',
		trigger: 'click',
		range: '~' //或 range: '~' 来自定义分割字符
	});
  var table = layui.table;
	var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: false //开启分页
	,limits:[10,20,50,100,200]
    ,cols: [[ //表头
		{type:"checkbox"},
        {field: 'id', title: 'ID',  sort: true},

		{field: 'name', title: '名称',width:360},
	    {field: 'platformId', title: 'platformId'},
	    {field: 'brandId', title: 'brandId'},
	   
		{field: 'enabled', title: '状态',templet:function(d){ 
			if(d.status==0) return '';
			if(d.status==1) return '<span style="color:green">已启用</span>';
	     	//if(d.enabled==-1) return '禁用';
		},width:100},
		
      {field: 'operation', title: '操作',minWidth:200,templet:function(d){
			var html = '';
			if(d.status == 0){
				html += '<button class="table-btn" onclick="setst(\''+d.id+'\',1)">上架</button>';
			}else{
			//	html += '<button class="table-btn" onclick="setst(\''+d.id+'\',0)">下架</button>';
			}
			return html;
      }}
    ]]
  });
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})

	
	function setst(id,st) {
	    console.log(id)
		layer.confirm('确定要'+(st==0?'下架':'上架')+'吗?',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('prosetst')}",{id:id,st:st},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
	</script>
	{include file="public/copyright"/}
</body>
</html>
