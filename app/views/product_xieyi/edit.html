<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>编辑商品协议</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	{include file="public/css"/}
	<style>
		#ggnamediv .layui-input,#ggvaldiv .layui-input{ display:inline;height:30px}
		.layui-form-label{width: 110px}
	</style>
</head>
<body>
<div class="layui-fluid">
	<div class="layui-row layui-col-space15">
		<div class="layui-card layui-col-md12">
			<div class="layui-card-header">
				{if !$info['id']}<i class="fa fa-plus"></i> 添加协议{else}<i class="fa fa-pencil"></i> 编辑协议{/if}
				<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>
			</div>
			<div class="layui-card-body" pad15>
				{if $info['status']==2}<blockquote class="layui-elem-quote" style="color:red">协议未审核通过，驳回原因：{$info.reason}</blockquote>{/if}
				<div class="layui-form">
					<input type="hidden" name="info[id]" value="{$info.id}"/>
					<div class="layui-form-item">
						<label class="layui-form-label">协议标题：</label>
						<div class="layui-input-inline" style="width:500px">
							<input type="text" name="info[name]" lay-verify="required" lay-verType="tips" class="layui-input" value="{$info.name}">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">协议内容：</label>
						<div class="layui-input-inline" style="width:500px">
							<script id="content" name="info[content]" type="text/plain" style="width:100%;height:500px">{$info.content}</script>
						</div>
					</div>
<!--					<div class="layui-form-item">-->
<!--						<label class="layui-form-label">状态：</label>-->
<!--						<div class="layui-input-inline">-->
<!--							<input type="radio" name="info[status]" value="1" title="通过" {if !$info['id'] || $info['status']==1}checked{/if}/>-->
<!--							<input type="radio" name="info[status]" value="2" title="拒绝" {if $info['id'] && $info['status']==2}checked{/if}/>-->
<!--						</div>-->
<!--					</div>-->
					<div class="layui-form-item">
						<label class="layui-form-label"></label>
						<div class="layui-input-block">
							<button class="layui-btn layui-btn-danger" lay-submit lay-filter="formsubmit">提 交</button>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
{include file="public/js"/}
<script>
	layui.laydate.render({
		elem: '#createtime'
		,type: 'datetime'
		,range: false,
		trigger: 'click'
	});
	var content = UE.getEditor('content');
	layui.form.on('submit(formsubmit)', function(obj){
		var field = obj.field
		field['info[content]'] = content.getContent();

		//console.log(field);return;
		var index = layer.load();
		$.post("{:url('save')}",field,function(data){
			layer.close(index);
			dialog(data.msg,data.status);
			if(data.status == 1){
				setTimeout(function(){
					parent.layer.close(parent.layer.getFrameIndex(window.name));
					parent.tableIns.reload()
				},1000)
			}
		})
	})
</script>
{include file="public/copyright"/}
</body>
</html>
