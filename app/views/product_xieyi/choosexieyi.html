<!--custom_file(product_xieyi)-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>商品协议</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header"><i class="fa fa-list"></i> 商品协议</div>
          <div class="layui-card-body" pad15>
			<div class="layui-form layui-col-md12" style="text-align:left;padding-bottom:10px">
				<div class="layui-inline layuiadmin-input-useradmin">
					<label class="layui-form-label" style="width:60px">标题</label>
					<div class="layui-input-block" style="width:120px;margin-left:90px">
						<input type="text" name="name" autocomplete="off" class="layui-input" value="">
					</div>
				</div>
				<div class="layui-inline">
					<label class="layui-form-label" style="width:30px">状态</label>
					<div class="layui-input-block" style="width:120px;margin-left:60px;text-align:left">
						<select name="status">
							<option value="">全部</option>
							<option value="0">未审核</option>
							<option value="1">审核通过</option>
							<option value="2">审核拒绝</option>
						</select>
					</div>
				</div>
				<div class="layui-inline">
					<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
						<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
					</button>
				</div>
			</div>
			<div class="layui-col-md12">
				<table id="tabledata" lay-filter="tabledata"></table>
			</div>
          </div>
        </div>
    </div>
  </div>
	{include file="public/js"/}
	<script type="text/html" id="nameTpl">
		<img src="{{d.pic}}" style="max-width:70px;float:left"/>
		<div style="float: left;width:200px;margin-left: 10px;white-space:normal;line-height:20px;">
			<div style="width:100%;padding-top:5px">{{# if(d.cid>0){ }}<span style="color:red">[{{d.cname}}] </span>{{# } }}{{d.name}}</div>
			<div style="padding-top:5px;font-size:12px">{{d.subname}}</div></div>
		</div>
	</script>
	<script>
  var table = layui.table;
	var datawhere = {};
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{:url('index')}" //数据接口
    ,page: true //开启分页
    ,cols: [[ //表头
	  {type:"checkbox"},
	  {field: 'id', title: 'ID',  sort: true,width:80},
	  {field: 'name', title: '协议名称',width:360},
	  {field: 'createtime', title: '创建时间',templet:function(d){ return date('Y-m-d H:i',d.createtime)}},
	  {field: 'status', title: '状态',templet:function(d){
			  var html = '';
			  if (d.status == 0) {
				  html += '<span>未审核</span>';
			  }
			  if (d.status == 1) {
				  html += '<span style="color: green;">审核通过</span>';
			  }
			  if (d.status == 2) {
				  html += '<span style="color: red;">审核拒绝</span>';
			  }
			  return html;
		  },width:80},
	  {field: 'operation', title: '操作',templet: '<div><button class="table-btn" onclick="choosexieyi(\'{{d.id}}\')">选择</button></div>',align:'center'}
    ]]
  });
	function choosexieyi(id){
		var index = layer.load();
		$.post("{:url('choosexieyi')}",{id:id},function(res){
			layer.close(index);
			window.parent.choosexieyi(res.data,"{$Request.param.args}");
			var index = parent.layer.getFrameIndex(window.name);
			parent.layer.close(index);
		})
	}
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})
	</script>
</body>
</html>
